name: Validate

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Validate source YAML
        run: python tools/validate.py --all

      - name: Build packs
        run: python tools/build_packs.py --all --output dist

      - name: Run tests
        run: python -m pytest -v

      - name: Check reproducibility
        run: python tools/check_generated.py

      - name: Inspect built packs
        run: |
          for f in dist/packs/*.guidepack; do
            python tools/inspect_pack.py "$f"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: packs
          path: dist/packs/
