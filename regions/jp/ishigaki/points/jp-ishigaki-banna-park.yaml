  title: "バンナ公園"
  summary: "石垣島の中心にそびえる標高230mのバンナ岳を丸ごと公園にした、日本最南端の都市公園。亜熱帯の原生林、エメラルドの海を見渡す展望台、蛍と渡り鳥が集まる自然の宝庫が、市街地からわずか4キロに広がる。"
  narration: |
    バンナ公園は石垣島の市街地からほんの4キロ北上したところにある、日本最南端の都市公園です。標高230メートルのバンナ岳を中心に、約290ヘクタールという広大な亜熱帯の森が広がっています。
    
    「バンナ」という名前の由来が、実はいまだに謎のままなんです。八重山の方言なのか、古い言葉なのか、地元の人に聞いても誰も正確に答えられない。有力な説では、遥か昔に南の海からサバニ（帆船）に乗ってやってきた人々が、この山に自分たちの言葉で名前をつけたものかもしれないと言われています。意味は失われてしまったのに、「バンナ岳」という地名だけが今もしっかり残っているというのが、なんとも不思議ですよね。
    
    この森がこれほど豊かな自然を保っているのには、もう一つ深い理由があります。太平洋戦争が終わった後、バンナ岳一帯は20年以上も「禁伐地」として手つかずのまま守られていたんです。戦争の傷跡を抱えながらも、ここの木々は静かに育ち続けた。その積み重ねが今の豊かな亜熱帯の森をつくっています。Aゾーンには慰霊碑も設置されており、穏やかな木漏れ日の中で、あの時代のことをそっと思い出させてくれます。
    
    1978年に整備が始まり、公園は5つのゾーンに分かれています。なかでも人気なのが「エメラルドの海を見る展望台」。晴れた日には、コバルトブルーとエメラルドグリーンが混ざり合ったような石垣の海と、竹富島、西表島などの離島が眼下に広がります。春になるとセイシカ（聖紫花）という淡いピンクの花が咲き乱れ、夏から秋にかけてはサシバやアカショウビンといった渡り鳥が立ち寄ります。夜になればホタル街道と呼ばれるDゾーンで、小さな光がふわふわと舞う幻想的な光景も楽しめますよ。市街地のすぐそこなのに、一歩入ればジャングルのような亜熱帯の空気に包まれる—バンナ公園はそんな不思議な場所なんです。
  observationPrompt: "「エメラルドの海を見る展望台」に立って、眼下の海をよく観察してみてください。海の色はどこもコバルトブルー一色でしょうか？それともエメラルドグリーンに見える場所がありますか？色が変わる境界線はどこにあって、なぜそこだけ色が違うのでしょうか？"
