    note: "意味不明の謎の地名「バンナ」、戦後禁伐地として守られた亜熱帯原生林、エメラルドの海の展望台、ホタル街道、渡り鳥観察所、世界の昆虫館と見どころが多層的。日本の都市公園としては最南端という唯一性もある。"
    sources: [jp-ishigaki-banna-park-source]
  interpretability:
