  title: "フサキビーチ"
  summary: "石垣島西岸に広がる天然の白砂ビーチ。珊瑚礁の海に沈む夕日と「エンジェルピア」が織りなす絶景、ウミガメが産卵に訪れる清澄な海水、そして1852年の悲劇を伝える唐人墓が隣接する、石垣島随一の夕日スポット。入場無料。"
  narration: |
    石垣島の西の端、夕日が海にまっすぐ落ちていく場所に、フサキビーチはあります。フサキビーチリゾートホテルに隣接していますが、宿泊客でなくても自由に立ち入ることができるんです。ホテルのロビーをすり抜けてビーチに出た瞬間、目の前に広がるのは珊瑚礁に囲まれた澄んだ海。遊泳エリアの中でも熱帯魚が泳いでいるのが素足で立っていても見えるほどです。
    
    このビーチで外せないのが「エンジェルピア」と呼ばれる桟橋です。沖へと伸びるその先端に立つと、小浜島や西表島のシルエットが夕焼けに浮かび上がる光景に出会えます。日が水平線に消える一瞬、空が緑色に輝く「グリーンフラッシュ」が現れることもあると地元の人は言います。また毎年夏には、ウミガメが産卵のためにひっそりとこの砂浜を訪れます。この白い砂浜が長年にわたって守られてきた理由のひとつが、まさにそのウミガメたちです。
    
    一方、ビーチの少し南に「唐人墓」という場所があります。1852年、アメリカの船「ロバート・バウン号」が400人の中国人労働者をカリフォルニアへ送る途中、石垣島沖で座礁しました。奴隷同然の扱いを受けていた彼らは船内で反乱を起こし島に上陸しましたが、駆けつけたイギリス兵に追い詰められ、銃撃・病死・自殺で次々と命を落としました。1971年に建てられた唐人墓には128人の霊が祀られ、鮮やかな中華風の装飾をまといながら、この美しい夕日の海を今も静かに見守っています。
    
    楽園の絶景と歴史の悲しみが同居するフサキビーチ。夕暮れ時にエンジェルピアの先端に立ってみてください。きっと、ただの「綺麗な海」以上の何かを感じるはずです。
  observationPrompt: "夕暮れ時、エンジェルピアの先端に立って太陽が水平線に沈む瞬間をじっと見てください――消える直前、空に何色が一瞬だけ現れましたか？"
