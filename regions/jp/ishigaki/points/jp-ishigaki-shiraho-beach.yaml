  title: "白保海岸"
  summary: "北半球最大的藍珊瑚群落就藏在這片礁盤之下——白保海岸是石垣島居民用二十年抗爭守護下來的「魚湧く海」，踏上這片白沙灘，不只是看海，更是見證一段保育傳奇。"
  narration: |
    你現在腳踩的這片白沙灘，在當地漁民心中有個充滿詩意的名字——「魚湧く海」，意思是「魚兒從海中湧現的大海」。光聽這個名字，就能感受到這片海有多麼豐饒。
    
    白保海岸是石垣島東南側一片長達十公里的天然海岸線，幾乎不見任何人工建設，沒有消波塊，沒有人工沙灘整備。礁盤從海岸延伸入海，孕育著北半球最大的藍珊瑚（アオサンゴ）群落，超過一百二十種珊瑚、三百種以上的魚類在此共存。藍珊瑚和一般珊瑚不同，帶著獨特的藍綠光澤，有些群落甚至已在水中靜靜生長了數百年。
    
    這片海，差點就永遠消失了。1979年，日本政府宣布要在石垣島興建新機場，最初選址就在白保海域的外海——計畫填海造地，把這片珊瑚礁直接埋在跑道之下。消息傳出，引發了強烈的反對聲浪。1987年，國際自然保護聯盟（IUCN）派員到白保進行調查，正式確認這裡的藍珊瑚群落是北半球規模最大的。隔年，IUCN在哥斯大黎加召開的國際大會上通過決議，要求日本政府重新審視計畫。地方居民、漁民、環保人士，加上來自全球各地的聲援，聯合起來整整抗爭了二十年。
    
    最終，新機場選址遷移到陸地上的卡拉岳一帶，就是你今天降落的南ぬ島石垣空港，於2013年正式開港——而白保的海，保住了。
    
    2000年，WWF日本在此設立「しらほサンゴ村」研究中心，持續監測珊瑚的健康狀況。2007年，這片海域正式劃入西表石垣國立公園，受到法律保護。今日的白保，海岸邊那棟低調的小建築，就是這段歷史的見證者。
    
    站在這裡，看著那片清澈得透底的水色，你很難想像腳下的礁盤裡，正有一群已經活了幾個世紀的生命，在悄悄地呼吸著。
  observationPrompt: "望向海面，試著找出水色從淺綠轉為深藍的那條界線——那裡就是礁盤的邊緣，北半球最大的藍珊瑚群落就藏在那片深色水域的礁石之下。你猜那些珊瑚今年幾歲了？"
