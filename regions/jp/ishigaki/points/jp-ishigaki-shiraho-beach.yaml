    score: 5
    note: "北半球最大規模的藍珊瑚（アオサンゴ）群落所在地；1988年IUCN通過國際決議要求日本政府重審機場計畫，是二十世紀日本最具代表性的自然保育運動之一，2007年納入西表石垣國立公園保護。"
    sources: [jp-ishigaki-shiraho-beach-source]
  distinctiveness:
    score: 5
    note: "藍珊瑚在全球極為罕見，白保的群落規模為北半球之冠，部分群落已持續生長數百年；兼具保育運動歷史意義與稀有生態景觀，在日本乃至全球無可取代。"
    sources: [jp-ishigaki-shiraho-beach-source]
  interpretability:
    score: 3
    note: "海岸風景與集落氛圍易於感受，但最核心的藍珊瑚群落藏在礁盤水下，岸邊肉眼不可見，需乘坐玻璃船或參加浮潛導覽才能親眼目睹，建議事前安排活動。"
