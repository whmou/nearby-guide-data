  title: "竹富島の集落"
  summary: "在竹富島，時間彷彿凝結。白珊瑚砂路、橘紅琉球古瓦、珊瑚礁石牆，加上緩緩漫步的水牛車與三味線歌聲，這座1987年被列為國家重要傳統建造物群保存地區的集落，是沖縄最美的活歷史。"
  narration: |
    從竹富港下船，騎上租來的自行車，沿著鋪滿白色珊瑚砂的小路往村子騎去——輪子轉著轉著，感覺把你帶回了一百年前。
    
    竹富島中央的三個聚落：東、西、仲筋，自1987年起被日本政府指定為「重要傳統建造物群保存地區」。走進集落，低矮的琉球式平房一字排開，橘紅古瓦屋頂上蹲著守護獸「獅咬」（シーサー），半獅半犬，據說能阻擋一切惡靈入侵。圍牆是島民一塊一塊從海邊撿來的珊瑚礁石疊砌而成，完全不用水泥，颱風年年來也屹立不搖。
    
    集落入口通常有個叫「スンマシャー」的小廣場，旁邊站著盤根錯節的大榕樹。這不只是乘涼用的——道路在這裡刻意轉彎或分叉，是風水設計，讓惡靈走到這裡就迷路、出不去。島上還有一座「ンブフル丘」，傳說一頭神牛在一夜之間堆出了這座小丘，世代守護著島民的平安。
    
    最讓人難忘的，是那輛緩緩行走在白砂路上的水牛車。坐上去，御者大哥彈著三味線唱「安里屋ユンタ」——講述竹富島古代第一美女クヤマ與眾多追求者的傳說——水牛慢步悠悠，完美詮釋了這座島特有的「よんなー」（慢慢來）哲學。
    
    1986年，島民制定了「竹富島憲章」，立下四個誓言：不賣、不污、不亂、不壞。就是這四個字，讓竹富島在觀光浪潮中依然保有這片琥珀般的風景，讓每個來到這裡的旅人都能感受到，有些地方真的值得用一輩子去珍惜。
  observationPrompt: "集落入口有個「スンマシャー」廣場，仔細看看廣場旁的道路——它是不是刻意轉彎或形成Y字岔路？當地人為什麼要把路設計成這樣，藏著什麼樣的智慧？"
