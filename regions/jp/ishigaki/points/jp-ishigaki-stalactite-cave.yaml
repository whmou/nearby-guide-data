  title: "石垣島鍾乳洞"
  summary: "超過二十萬年才孕育而成的地底奇境——珊瑚礁石灰岩中藏著貝類化石、天然形成的「龍貓石筍」與傳說中的長壽之湖，一步踏入洞，彷彿穿越億萬年時光！"
  narration: |
    走進洞口的那一刻，一股清涼撲面而來——洞內常年維持23°C、濕度高達90%，和外頭南國的烈日截然不同，彷彿瞬間進入另一個世界。這個地底秘境，已靜靜等待了超過二十萬年。
    
    石垣島鍾乳洞是由珊瑚礁石灰岩所形成的天然洞窟，全長3.2公里，是石垣島規模最大的鍾乳洞。遠古時代，這裡曾是一片汪洋，大型貝類與珊瑚礁在此繁盛生息；隨著地殼緩緩隆起，海底世界慢慢浮出地面，千萬年的地下水一滴一滴滲透、溶蝕，才雕刻出今日的奇景。如今洞壁上仍清晰可見貝類化石的印跡，那正是這段滄海桑田最無聲的見證者。
    
    這個洞穴有段有趣的「身世」。最初被命名為「龍宮城鍾乳洞」，入口那座白色建築，便是為了呼應海底龍王宮殿的傳說而設計，充滿神話色彩。直到2002年才正式改名為「石垣島鍾乳洞」，然而它的神秘魅力絲毫未減。
    
    開放參觀的路段約660公尺，只佔全洞五分之一，其餘四分之四仍是人跡未至的黑暗深處。沿途你會看到石筍與鍾乳石相互連結成一根根石柱，仙境廣場一帶尤其壯觀，彷彿誤入精靈居住的殿堂。洞內還有一座「不老長壽之湖」，透明清澈的泉水映著洞頂的倒影，傳說此水含有延年益壽的成分，是當地信仰中的聖地。
    
    最讓人驚呼的，是那根天然形成的「龍貓石筍」——一顆圓滾滾的大石筍頂端，竟然伸出兩根細細的石筍，神似宮崎駿《龍貓》裡的大耳精靈，這完全是大自然歷經萬年的鬼斧神工，連宮崎駿本人或許都要嘖嘖稱奇。走出洞口，熱帶果園的芒果樹、香蕉樹環繞著你，南國陽光讓你從二十萬年的地底時光輕盈地回到現實。
  observationPrompt: "在洞內仔細尋找那根天然形成的「龍貓石筍」，看看它的耳朵形狀是否真的像動畫裡的龍貓——你認為大自然花了多少萬年，才「不小心」雕刻出這個巧合？"
