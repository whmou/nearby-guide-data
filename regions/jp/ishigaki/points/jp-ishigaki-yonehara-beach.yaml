  title: "米原ビーチ"
  summary: "石垣島北部最知名的岸邊浮潛聖地，踩幾步進海就能看見珊瑚礁與小丑魚，旁邊還有全球僅石垣島與西表島才有的天然記念物ヤエヤマヤシ群落——這片海，不是風景，是八重山的日常。"
  narration: |
    想像一下，腳踩細白沙灘，眼前是透明翡翠綠的海水，珊瑚礁就在腳下幾步外展開——這就是石垣島米原ビーチ，也是八重山最知名的岸邊浮潛聖地。這裡屬於「西表石垣國立公園」，大自然替你守著這片海。
    
    米原最讓人驚豔的，是完全不需要搭船出海。從岸邊踩進水裡幾步路，卡通裡才看得到的小丑魚（カクレクマノミ）就在身邊穿梭，彩色熱帶魚在珊瑚叢中進進出出。當地人說，來石垣島不來米原浮潛，就像去京都沒看金閣寺一樣可惜。
    
    走上岸往內陸走幾步，還有另一個驚喜——「米原のヤエヤマヤシ群落」，這裡生長著全世界只在石垣島與西表島才有的ヤエヤマヤシ，是日本國指定天然記念物。這種棕櫚樹高可達二十五公尺，一屬一種，孤傲地守護著八重山。科學家推測，它們約在一百萬年前，趁著海平面下降、陸地與大陸相連之際，從南方遷徙定居於此，從此再也沒有離開。
    
    浮潛要注意：礁盤很淺，退潮時珊瑚露出水面幾乎沒法游，漲潮才是入水的好時機。珊瑚礁特有的離岸流不容小覷，連在地人都對這裡的水流保持敬意，建議跟著潮汐走、或找在地浮潛團帶路。踩在沙灘上、看棕櫚樹影打在海面上，你會明白為什麼八重山人說——這片海，不是風景，是日常。
  observationPrompt: "站在淺水區向海底看，試著找找橘白條紋的小丑魚——牠們最愛躲在哪一種珊瑚附近？你能數出幾條？"
