  title: "730記念碑"
  summary: "站在這個普通的十字路口，你腳下踩的是一段沖繩「回家之路」的起點——1978年7月30日清晨，石垣島在短短八個小時內完成了從靠右行駛到靠左行駛的歷史切換，這塊石碑就是那個奇蹟之夜的見證。"
  narration: |
    站在這個叫做「730交差點」的路口，你可能覺得它看起來就是一個普通的市區十字路口，但這裡藏著一段讓石垣島人至今津津樂道的歷史。
    
    時間回到1945年，二次大戰末期，美軍佔領沖繩之後，強制把整個沖繩的行車方向從靠左改成靠右——跟美國本土一樣。這一改，就改了三十多年。
    
    1972年，沖繩正式回歸日本，但行車方向這件事卻沒有立刻跟著改。那六年間，沖繩人開車靠右，日本本土靠左，坐船到本州一出站，方向感整個打亂，各種驚魂記多的是。
    
    終於，在1978年7月30日，這一天到來了。
    
    為了讓這個歷史性的切換平安完成，當局從7月29日深夜10點開始，到30日早上6點的八個小時內，除了緊急車輛，全面禁止車輛上路。幾百名工人徹夜不眠，把全島的道路標誌、地上的標線全部換掉。
    
    早上6點整，消防署的警報器鳴響，石垣港的大小船隻同時拉起汽笛——這就是切換的信號。沖繩全縣在同一瞬間，所有車輛切換成靠左行駛。整個過程竟然順利完成，沒有發生重大事故，讓當時的人鬆了一大口氣。
    
    為了慶祝這個了不起的成功，石垣島在這個路口豎立了這塊730記念碑。有趣的是，記念碑的設計者其實是一位當地的警察官，他把這個重要的日子刻進石頭裡，留給後人記憶。
    
    2008年，切換三十週年的時候，這裡又加設了一對用八重山方言叫做「シィーシィー」的石獅子，把整個地方改建成小公園，命名為「730シィーシィーパーク」，讓這段歷史在南國的陽光下繼續活著。下次你在石垣島騎車靠著左側行駛時，或許會想起那個在黑夜中徹夜換標誌的奇蹟之夜。
