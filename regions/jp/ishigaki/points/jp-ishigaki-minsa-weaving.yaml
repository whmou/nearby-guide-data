  title: "みんさー工芸館（ミンサー織り体験）"
  summary: "「五格四格」的絣紋藏著花嫁的盼望：願你永遠來找我。八重山ミンサー傳承400年，在みんさー工芸館親手織出這份最古老的情書。"
  narration: |
    你知道嗎？石垣島這條小小的腰帶，藏著一段400年前的愛情故事。
    
    1642年，棉花第一次被帶進八重山群島，從此這裡的女性開始了ミンサー腰帶的織造文化。那個年代的八重山，流行一種叫「通婚」的習俗——男方不是直接迎娶，而是定期造訪女方家中。當一個女子愛上了某個男人，她不會說出口，而是悄悄坐在織機前，把心意一格一格地織進帶子裡。
    
    這個圖案叫做「五格四格」的絣紋——五個方格、四個方格交替排列。日語中，「五」唸做「いつ（itsu）」，「四」唸做「よ（yo）」，合起來就是「いつの世（よ）までも」——意思是「無論何時、在哪個世界，願你都來找我」。一條小小的腰帶，裝進了她最深的盼望。帶子兩側還有細長的縱線，象徵著「我會一直等著你」。
    
    時光流轉400年，這份溫柔的思念已成了石垣島的驕傲。今天「五格四格」的圖案印在包包、錢包、甚至夏天的カリユシウェア（沖縄版花樣短袖衫）上，走在島上，你到處都能見到它。每次看到這個圖案，想想背後那個在燈下獨自織布、默默等待的女子，是不是有點心疼？
    
    而在みんさー工芸館，你有機會親手織出這份情意。坐上傳統腰機，在師傅耐心指導下，一格一格推進橫線——短短20到30分鐘，一個屬於自己的ミンサー杯墊就誕生了。館內的展示室還可免費參觀，從紡線、染色到成品，整個製作流程一覽無遺。織的時候，你可能也會不由得想：如果是你，你想把這條帶子送給誰？
  observationPrompt: "展示室裡的ミンサー腰帶，你能找到那個代表「永遠」的「五格四格」絣紋嗎？仔細數一數，是不是真的五個方格緊接著四個方格不斷重複？"
