  title: "石垣島天文台（むりかぶし望遠鏡）"
  summary: "九州沖繩最大的105公分望遠鏡就藏在前勢岳山頂——在這座日本最南端的國立天文台，南十字星、86個星座與璀璨銀河全都在同一片夜空，是由高中生連署請願才促成的夢幻天文聖地。"
  narration: |
    站在前勢岳山頂，一座白色圓頂靜靜矗立在熱帶叢林之間，那就是石垣島天文台。這裡的主角叫「むりかぶし望遠鏡」——「むりかぶし」是八重山方言裡對昴宿星團的稱呼，和日語的「昴（すばる）」同義。換句話說，這台105公分的大望遠鏡，和夏威夷那台舉世聞名的昴星望遠鏡，共享著同一個靈魂名字，只是一南一北，遙遙對話。
    
    天文台於2006年由國立天文台與石垣市攜手建立，是九州沖繩最大的光學紅外線望遠鏡所在地。但開幕才半年，颱風就重創了這裡，設施被迫關閉整修，直到2007年才重新迎接訪客。那段從誕生到風雨洗禮再到重生的歷程，是這座天文台最早的考驗。
    
    讓天文迷驚喜的是，石垣島位於北緯24度，大氣不受噴射氣流干擾，星點穩定清晰，是全日本獨一無二的觀測優勢。全天88個星座在此可見86個；南十字星——在台灣的緯度永遠見不到的南半球象徵——在這裡的冬夜卻清晰可辨。這裡一年約有300個晴夜，被評選為亞洲數一數二的美麗星空之地。
    
    天文台的誕生還有一段感人的幕後故事：建設初期，正是石垣島的高中生自發連署、向市議會請願，才推動了政府撥款支持。望遠鏡裝設完成後，這群學生更親手在儀器上描繪了八重山傳統棉布「ミンサー」的織紋，象徵著「いつ（五）の世（四）までも」——直到永遠的祝願。每一個仰望星空的夜晚，都悄悄疊加著那群少年的心意。
  observationPrompt: "仔細找找望遠鏡圓頂建築上，有沒有看到特殊的幾何圖案？那是八重山傳統棉布「ミンサー」的織紋，由當年連署促成天文台建設的高中生親手描繪——你知道這個圖案代表什麼含義嗎？"
