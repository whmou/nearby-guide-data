  title: "川平湾グラスボート"
  summary: "米其林三星認定的川平湾，因全面禁止游泳而保留了最原始的珊瑚礁——坐上玻璃船，透過腳下玻璃窗近距離觀賞250種珊瑚與悠游海龜，不弄濕一根頭髮就能窺見石垣島最美的海底世界。"
  narration: |
    站在川平湾的白沙灘上，眼前這片隨著光線變幻、從翡翠綠流向鈷藍的海水，看起來平靜得像一面鏡子。但這片海的故事，遠比外表深沉得多。
    
    幾百年前，川平湾是琉球王朝貿易木帆船「マーラン船」的天然避風港。從石垣港出發、載著貢品前往首里城的船隊，遇上逆風就會停靠這裡等上好幾天。你腳下這片沙灘，曾是水手們仰望星空等待出航的地方。
    
    二戰期間，這個隱密的海灣又換了一種面貌——日本軍在此秘密部署特攻艇，那些小型快艇原本準備衝撞盟軍軍艦，卻因戰事終結而未曾出擊。如今海面上再無任何硝煙的痕跡，只剩下一片不知道當年故事的寧靜。
    
    戰後的1963年，川平湾迎來了足以改寫世界珠寶史的一刻：日本首次在這裡成功養殖出黑蝶真珠，那深邃的暗黑光澤令全世界為之傾倒。走在石垣島街頭隨處可見的真珠店，背後都與這片海有著直接的淵源，至今灣內仍有養殖場在運作。
    
    當地還流傳著一個古老傳說——這灣裡曾有人魚棲居。而當你坐上グラスボート，透過腳下的玻璃窗凝視海底，看見海龜悠然游過250多種珊瑚之間，不難理解這個傳說因何而生。
    
    川平湾全面禁止游泳，強勁的潮流守護著這片海，也正因如此，珊瑚礁才得以如此完整原始。玻璃船大約每15分鐘一班、全程30分鐘，是唯一能讓你近距離窺探這片海底世界的方式——而這，正是米其林給出三顆星的理由。
  observationPrompt: "玻璃船緩緩駛入灣中央時，試著同時留意海底的兩件事：珊瑚的顏色是否鮮豔飽滿（代表健康存活），以及船底玻璃窗下有沒有海龜出沒——你覺得今天的海底，活珊瑚和白化珊瑚哪一種比較多？"
