  title: "川平石崎マンタスクランブル"
  summary: "川平灣外海1公里的神秘水下世界，是全球公認的魟魚聖地。1985年由在地潛水先驅開拓，超過300隻魟魚在此建立「清潔站」，遭遇率高達九成。9至11月可見十餘隻列隊同游的壯觀「魟魚列車」，是潛水客一生必體驗的奇景。"
  narration: |
    從川平灣出發的潛水船，駛離海岸約十分鐘後，海水顏色從碧綠驟然轉為湛藍。船長一聲令下，就是這裡了——マンタスクランブル，石垣島最具傳奇色彩的潛點，也是許多人一輩子最難忘的潛水記憶。
    
    一切要從1985年說起。當時年僅19歲的園田真先生，離鄉移居石垣島，在川平灣外海約1公里的珊瑚礁間，意外發現了一群魟魚聚集的秘密。消息刊上潛水雜誌的隔天，竟然有50艘船同時湧至，「不見魟魚就等於沒去石垣島！」這句話從此在日本潛水界廣為流傳。
    
    為何魟魚如此鍾情於此？答案藏在「清潔站」裡。珊瑚根附近棲息著大批小魚，牠們會游到魟魚身上，一口一口清除寄生蟲。對魟魚而言，這裡是貨真價實的「海底美容院」——張開如翅膀般的巨大體翼懸停水中，一臉陶醉等著被服務，那模樣讓人忍不住微笑。
    
    園田先生與川平的潛水業者共同制定了守護規則：不踩珊瑚根、不追逐、不觸碰，魟魚游過頭頂時甚至要暫時憋氣，以免氣泡嚇到牠們。正是這份用心，讓超過300隻魟魚至今仍在此安居。每隻魟魚的腹部花紋各不相同，就像人類指紋，導遊們為每隻取了名字，數十年如一日地記錄觀察。
    
    每年9月至11月是「魟魚列車」的高峰期，雄魟群起追著雌魟，十隻以上連成一線蜿蜒游過——那份壯觀，是此生難忘的禮物。
  observationPrompt: "魟魚游到你面前時，仔細觀察牠腹部的花紋——那個圖案讓你聯想到什麼形狀？這是辨認每隻魟魚身份的專屬「指紋」，導遊甚至能叫出牠的名字！"
