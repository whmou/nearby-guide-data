  title: "平久保崎灯台"
  summary: "石垣島最北端的白色燈塔，俯瞰翡翠色珊瑚礁海，守望的不只是船隻，更是三百多年前琉球王國烽火台的靈魂所在。2016年獲選日本「戀愛燈塔」，是島上最浪漫的天涯海角。"
  narration: |
    站在平久保崎的頂端，左手是東海、右手是太平洋，而你腳下這片翠綠草原，正是石垣島的最北端——再往前走幾步，就是大海了。那座白色燈塔靜靜立在懸崖邊，彷彿島嶼派駐在天涯的守門人，數十年如一日地為往來船隻指引方向。
    
    但你知道嗎？早在這座燈塔誕生的三百多年前，這片岬角就已經有人在守望了。十七世紀琉球王國時期，這裡設立了一座「遠見台」——也就是瞭望塔，用來監視往來的外國船隻，一旦發現異狀，就靠煙火訊號傳遞消息。那個沒有雷達、沒有通訊設備的年代，守望員就這樣日復一日，用一雙肉眼守護整座島嶼。這座遠見台遺址在2007年被日本政府列為國家史跡，就在燈塔旁邊，不妨仔細找找。
    
    現在這座白色混凝土燈塔，是1965年由琉球政府所建，比沖繩回歸日本還早了七年。燈塔本身只有13公尺高，卻因為建在海拔74公尺的高地上，光芒可以照耀方圓數十海里。1972年沖繩回歸後，它交由日本海上保安廳接管，至今仍忠誠執勤，每三秒閃爍一次白光。
    
    2016年，一件浪漫的事讓這裡多了新的意義：日本浪漫主義協會認定它為「戀愛燈塔」，而且是沖繩縣第一座。評審理由令人動容——從石垣市區往北開，穿過甘蔗田、牛群悠閒漫步的鄉間小路，抵達燈塔的那一瞬間，「原來世界的盡頭是這樣的」那種感動，讓人忍不住想和最重要的人分享。燈塔旁如今立著一塊心形的認定看板，已成情侶必訪的浪漫據點。
  observationPrompt: "在燈塔旁的草地上，仔細尋找「平久保遠見台」的遺跡——這個比燈塔早三百多年的琉球王國烽火台，你能找到它的痕跡在哪裡嗎？"
