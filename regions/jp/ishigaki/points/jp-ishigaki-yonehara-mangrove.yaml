  title: "米原マングローブ林（吹通川ヒルギ群落）"
  summary: "石垣島北部米原ビーチ旁，隱藏著一片被指定為天然記念物的紅樹林迷宮——退潮時，泥灘上招潮蟹與彈塗魚同場演出，帶你見識熱帶濕地食物鏈最精彩的起點。"
  narration: |
    你現在站在的這片綠色迷宮，正式名稱叫「吹通川ヒルギ群落」，也就是本地人口中的「米原マングローブ林」。這條全長約兩公里的吹通川，從北部野底岳流淌而下，在靠近東海出口的地方，山上的淡水與潮水悄悄在這裡交融，形成了一片特殊的汽水域。正是這不淡不鹹的交界，讓紅樹林得以在這裡紮根。
    
    這裡的紅樹由三種ヒルギ共同構成：ヤエヤマヒルギ、オヒルギ和メヒルギ。你可以仔細觀察每棵樹根系的形狀——有的像竹竿叢叢插進泥土（呼吸根），有的則像章魚腳一樣向四方張開支撐整棵樹（支柱根）。這些千奇百怪的根，都是紅樹為了在水中缺氧的泥灘中存活而演化出的獨特把戲。正因為這片生態系的珍貴，早在1973年便被指定為石垣市天然記念物，後來更入選「日本重要濕地500選」，納入西表石垣國立公園範圍。
    
    退潮的時候最熱鬧。泥灘上招潮蟹高舉著那一大一小的螯，彷彿在揮手打招呼；彈塗魚用胸鰭撐起身體，在泥地上「走路」覓食，有時頭頂還有琉球翡翠鳥或蛇鵰悄悄掠過。這個生態系就像一間多功能的旅館：魚蝦在根系間產卵、育苗，候鳥飛來覓食，整條食物鏈在這裡悄悄運轉。
    
    很多人第一眼看到紅樹林，都覺得「這只是一堆奇怪的雜木」。但如果你划著獨木舟鑽進這片林子，樹蓋遮住陽光，耳邊只剩下水聲和蟲鳴，那種被大自然包覆的感覺，是任何照片都無法傳達的靜謐。
  observationPrompt: "你能找到ヤエヤマヒルギ、オヒルギ、メヒルギ三種紅樹嗎？仔細比較它們的根系形狀——哪一種的根看起來最像在「用力呼吸」？"
