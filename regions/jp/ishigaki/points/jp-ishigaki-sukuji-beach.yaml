  title: "底地ビーチ"
  summary: "底地ビーチ是石垣島最美的弧形白沙灘，遠淺平靜的水域是親子天堂，也是全日本最早宣告夏天來臨的海開き舞台，傍晚更搖身一變成絕美夕陽觀賞地。"
  narration: |
    站在底地ビーチ的白沙上，放眼望去是一條長達一公里的弧形海灣，潔白沙灘與翡翠色海水在眼前延展，入口的莿桐林隨風輕搖。這裡靜，這裡慢，卻藏著讓島民驕傲的故事。
    
    「すくじ（底地）」這個名字來自八重山古老方言，指地形低緩、與海面相接的土地。石垣島在琉球王國時代是統管八重山群島的行政中心，古老地名至今仍留在地圖上，底地就是其中之一，讀著這兩個漢字，彷彿能感受到幾百年前人們在此生活的氣息。
    
    每年三月，八重山最令人期待的盛事在這裡揭幕——全日本最早舉辦的「海開き」儀式，由石垣市、竹富町、與那國町三地輪流主辦，舉行祈求海上平安的神事。想想看，當台灣和本州還在穿外套的三月，這裡的孩子已在嬉水，這份南國驕傲讓島民每年都熱切期待。
    
    底地ビーチ的另一個秘密是它的水極淺，遠浅的海床讓你走了好遠水還是及膝，低潮時幾乎可以漫步海面，腳下白沙閃光。這樣的地形讓它成為石垣島最安全的海灘，當地潛水教練異口同聲把它列為親子首選。
    
    面朝西邊，遠方石崎半島是日本頂級的鬼蝠魟（マンタ）觀察聖地，搭船五分鐘便能在水下看見牠如飛毯滑翔。白天游水，傍晚看夕陽沉入東海，夜裡仰望八重山星空保護區的繁星——底地ビーチ，一天有三種截然不同的面貌。
  observationPrompt: "站在沙灘中央往兩側望去，試著找出弧形沙灘的兩個端點——右手邊遠方那條青色山脊就是石崎半島，是日本頂級的鬼蝠魟出沒地，你能估算出它距這裡有多遠嗎？"
