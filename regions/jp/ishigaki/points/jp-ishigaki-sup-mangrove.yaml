  title: "SUPマングローブ体験（宮良川）"
  summary: "石垣島最長の宮良川を、ボードの上に立ちながら静かに遡る。国指定天然記念物のマングローブ原生林を自分のペースで探索できる、石垣島でしか味わえない非日常体験。"
  narration: |
    宮良川は石垣島で最も長い川、全長12キロの本格的な河川です。市街地から車で10分ほど南東に走ると、突然空気が変わります。窓を開けると、小鳥のさえずりと水のせせらぎが耳に飛び込んでくる。その瞬間、あなたはまったく別の世界に踏み込んでいます。
    
    このマングローブ林は1972年に国の天然記念物に指定されています。河口から両岸1.5キロにわたって広がる225ヘクタールの林は日本最大級の規模で、ユネスコの「日本の重要湿地500」にも選ばれています。ヤエヤマヒルギ、メヒルギ、オヒルギという三種類のヒルギが、水面から奇妙な形の根を伸ばしている姿は、まるで太古の生命力が溢れているようです。あの複雑に絡まった「タコ足根」は、水中に酸素を送るために進化した特殊な器官で、無数の小さな生き物のすみかになっています。
    
    SUPボードに立って静かに川を遡ると、頭上でマングローブの枝がアーチを作ります。パドルを止めて水面に目を向けると、驚くべきものが現れます――ミナミトビハゼが陸の上を歩いている！両目が飛び出ていて、ひれを足のように使って移動するこの魚は、まさに「水から陸への進化の途中」を今も生きている生き物です。ガイドがそっと指さすまで気づかなかった、という人がほとんどです。
    
    琉球王国の時代から、宮良の集落の人々はこの川に寄り添って生きてきました。川魚を獲り、木材を利用し、上流の石灰岩洞窟を精霊が宿る場として大切にしてきたと伝えられています。SUPやカヌーでしか届かない上流の鍾乳洞は、今でも神秘的な雰囲気を残しています。
    
    早朝6時のツアーなら、朝霧の中に浮かぶマングローブと静寂の川面が待っています。写真・備品レンタル・ホテル送迎込みでガイドが同行してくれるので、初心者でも安心して体験できます。
  observationPrompt: "SUPボードを止めてマングローブの根元をじっと観察してみてください。水面と陸の境目に、ひれを使って歩いている生き物を見つけられますか？それは何で、なぜ水の中に戻らなくていいのでしょう？"
