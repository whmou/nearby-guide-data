  title: "宮良殿内（みやらどぅんち）"
  summary: "沖繩縣內唯一現存的琉球王國時代武士宅邸，200年前主人硬是抵抗了五次拆除命令，就連王府也拿他沒辦法。紅瓦屋頂下藏著的，是一段寫在石頭與庭園之間的倔強歷史。"
  narration: |
    站在宮良殿内的表門前，你可能不會想到，這棟外表安靜的紅瓦宅邸，背後藏著一段長達半世紀的「抗命」故事。
    
    那是1819年，文政二年。宮良家第八代當主宮良当演，擔任八重山地方的最高行政長官，決定為自己建一棟像樣的宅邸。他請來首里王府的造園名師城間親雲上，照著沖繩貴族宅邸的規格打造——紅瓦屋頂、日式枯山水庭園、精緻的築地塀圍牆，室內還請來石垣在地畫家久宇那安進繪製裝飾。
    
    問題來了。琉球王國對士族住宅有嚴格的階級規定，這棟宅子的氣派遠超過当演的身份所允許。首里王府看不過去，一道命令下來：拆掉重建。
    
    当演沒有理會。王府再下命令，還是不動。就這樣，整整五次拆除令，宮良家一概置之不理，這棟宅子就這麼挺立著，讓王府的命令飄散在八重山的海風裡。一直到1874年明治時代的巡查官員親自登門，才真正逼使宮良家把紅瓦換成茅草屋頂。但茅草才蓋了25年，1899年瓦片就又悄悄換回來了。
    
    庭園更值得多停留一會兒。這座枯山水庭園用的是琉球石灰岩，不是遠道而來的奇石，而是這片土地本身的骨骼。園中無水卻意境深遠，礫石的曲線代表流水，巨石的陳列象徵山嶺，是首里造園技術融入八重山風土的獨特詮釋，1972年與建築同步列為國家名勝。
    
    今天，這裡是沖繩縣內唯一保存至今的琉球王國時代武士宅邸，也是國家重要文化財。站在這片庭園裡，想著200年前那個寧可抵抗王命也不肯妥協的宮良当演，你會發現這棟宅子的美，不只是建築本身，而是一份傲骨。
  observationPrompt: "走進庭園仔細看那些琉球石灰岩大石與礫石紋路——造園師用什麼方式，讓這座沒有一滴水的庭園，看起來卻有山川流水的感覺？"
