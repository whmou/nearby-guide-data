  title: "石垣市公設市場"
  summary: "超過125年歷史的「島廚房」，從珊瑚礁鮮魚、石垣牛到八重山傳統織品一應俱全，是感受石垣島真實生活脈動、絕對不能錯過的在地場所。"
  narration: |
    站在石垣市大川208這棟樸素的三層樓建築前，很難想像眼前這個地方已守護石垣島居民超過一百二十五年。一八九九年，正值明治年間，市場最初只是八重山郵局南側的一排小魚攤，漁夫每天清晨把剛從海裡撈上來的珊瑚礁魚擺出來賣。五年後遷移到現址，此後扎根不動，島民親暱地稱它「島の台所」——島的廚房。
    
    地下一樓永遠是最鮮活的地方。蔬果攤的阿嬸一刀切開鮮黃的石垣產鳳梨，汁液噴濺，笑著說「甜！吃看看！」魚攤上躺著珊瑚礁才剛撈起的熱帶海魚，顏色鮮豔得像寶石；旁邊的石垣牛攤位擺著霜降紋路美得令人屏息的牛肉——石垣牛可是日本頂級和牛，在產地買，比東京便宜一半都不止。
    
    二樓特產中心有個值得停留的小驚喜：「生チンスコウ」。金楚糕是沖縄傳統乾點心，但這裡賣的是軟濕版，入口即化，比一般版本更銷魂。架上還有八重山Minsar棉紗織品，五條加四條的交錯紋路，在八重山語裡象徵「五と四、永遠に」，是過去年輕人向心儀對象傳遞愛意的傳統信物。
    
    最特別的是三樓食堂的服務：你可以在地下樓挑好新鮮食材，拿上去請師傅當場料理。這種「自帶原料現場加工」的模式在日本其他地方幾乎絕跡，在這裡卻是理所當然的日常。點一盤苦瓜炒蛋、一碗海葡萄，對著窗外的石垣市區天空，喝一口泡盛——這才是最道地的石垣島午餐。市場在2021年完成地下層整修，空間更寬敞明亮，但那股生猛的島廚房氣息，一點都沒有少。
  observationPrompt: "走進地下樓魚肉蔬果區，找找看有沒有你在台灣或日本本島從沒見過的熱帶魚種或蔬果——牠叫什麼名字？你猜當地人會怎麼料理它？"
