  title: "コンドイビーチ（コンドイ浜）"
  summary: "竹富島西岸最純粹的天堂海灘，退潮時海中浮現的「幻之濱」沙洲讓你四面環海、彷彿站在世界的盡頭。星砂傳說、八重山最美夕陽，コンドイビーチ是許多旅人一生難忘的海岸。"
  narration: |
    來到竹富島，騎著腳踏車穿過鋪著珊瑚砂的白色小路，拐過那條被扶桑花包圍的小徑，突然眼前的景色會讓你不由自主地停下來——那就是コンドイビーチ，竹富島最美的海灘。
    
    這裡的海水透明到能看見腳趾，遠淺的地形讓海灣格外平靜，就算帶著小孩也能放心戲水。但這裡最神奇的景象要靠「時機」才能遇到——退潮的時候，一片白色的沙洲會從海面緩緩浮現，島民稱它為「幻之濱」。你可以赤腳走過去，四面環海，頭頂是無邊藍天，彷彿站在世界的中心。
    
    這片白沙背後有個讓人心疼的傳說。北方的星星尼努法和南方的星星烏瑪努法相愛，神明賜予他們到竹富島的珊瑚礁中孕育孩子。然而龍宮之神大怒，喚來大蛇吞噬了所有星之子。那些孩子的骨骸化成星形的砂粒，隨海浪漂流、沉積在海灘上——這就是「星砂」的由來。這種星形小顆粒其實是有孔蟲的外殼，直徑只有兩三毫米，每一顆都有美麗的放射狀尖角，仔細找找，你一定能在腳邊的白沙中發現它們。
    
    竹富島還是一首古老民謠的故鄉。《安里屋ユンタ》唱的是16歲美女クヤマ的故事——她被首里王府派來的官員求婚，卻大膽拒絕，這份從容的勇氣幾百年後依然在島上流傳。
    
    傍晚時分，坐在沙灘上等夕陽沉入海平線，天空從金黃漸漸染成橘紅——這道日落，據說是整個八重山群島最美的風景。無論如何，請留下來等到太陽完全消失的那一刻。
  observationPrompt: "仔細蹲下來看腳邊的白沙，你能找到幾顆形狀像星星、有放射狀尖角的「星砂」？這些其實是一種單細胞生物「有孔蟲」的外殼——拿在手心數數看，你找到的星砂有幾個角？"
