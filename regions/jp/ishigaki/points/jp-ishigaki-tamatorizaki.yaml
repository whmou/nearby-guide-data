  title: "玉取崎展望台"
  summary: "石垣島腰身最細處的制高點，站上展望台左手東海、右手太平洋，兩片大海同時入眼；沿途朱槿花道盛開全年，從停車場步行僅需3分鐘，是石垣島效益最高的免費絕景。"
  narration: |
    來到石垣島北部，有個地方是許多人「非去不可」的打卡點——玉取崎展望台。它坐落在石垣島收腰最細的地方，也就是伊原間這一帶。站在展望台上往下一看，你會發現腳下的陸地窄得出奇，左手邊是東海，右手邊是太平洋——兩片大海同時出現在你眼前，這種景色在全世界都屬罕見。
    
    這個細腰地帶叫做「船越」，也就是「把船搬過去」的意思。以前的漁夫根據當天的海況決定要去哪裡作業，碰到某一側海況太差的時候，就直接把小漁船扛起來，走個幾百公尺搬到另一側的海放下去繼續出發。這條陸地的最窄處只有270公尺，所以在沒有引擎船的年代，「搬船過山」是很常見的生活智慧。
    
    往遠處看，你會看到一條細長的半島從石垣島延伸出去，那就是平久保半島。當地人有個可愛的說法：整個石垣島的形狀像是沖繩的守護神「シーサー（石獅）」，而平久保半島就是牠翹起來的尾巴。從這個展望台往北望去，幾乎可以看到半島最遠端的平久保崎燈台，那是整個石垣島的最北端。
    
    從停車場沿著步道走上來，兩旁種滿了一整年都在盛開的朱槿花，紅的、粉的、橙的，迎風搖曳，南國感撲面而來。朱槿是沖繩的代表花卉之一，石垣島的強烈日照讓它們開得格外鮮豔，走在這條花道上本身就是一種享受。
    
    展望台建於1989年2月，是相對現代的設施，但這個制高點眺望雙海的天然優勢，早在幾百年前就已是漁民辨別航路、決定出海方向的地標。入場完全免費，停車場可停約30台車，步行到展望台只要3到5分鐘，是石垣島最值得順路停靠的景點之一。
  observationPrompt: "站在展望台向下俯瞰，你能同時看到左右兩側的海嗎？試著分辨哪一邊是東海、哪一邊是太平洋——仔細觀察兩片海的顏色或波紋，有沒有什麼不一樣？"
