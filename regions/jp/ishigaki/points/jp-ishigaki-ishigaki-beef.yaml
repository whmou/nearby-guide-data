  title: "石垣牛焼肉"
  summary: "松阪牛・近江牛の「隠れた親戚」、それが石垣牛。南国の離島で生まれた和牛ブランドの本場で、炭火の香りとともにその秘密を味わおう。島内70軒超の焼肉店が集まる美崎町は、石垣の夜を代表する美食街。"
  narration: |
    走進石垣島的夜晚，美崎町的燒肉店招牌一家接著一家亮起，空氣裡飄著炭火烤肉的香氣。這裡有一個多數遊客不知道的秘密：你手邊正夾著的那片石垣牛，極有可能就是松阪牛、近江牛、米澤牛這些日本頂級和牛的「親戚」——甚至是它們的老祖宗。
    
    石垣島和八重山群島長年以來是全日本最重要的和牛素牛產地。所謂「素牛」，就是出生後被送往本州各地飼育、育成當地品牌牛的幼牛。意思是說，那些在高級料亭讓人嘖嘖稱奇的名牌和牛，很多都是在這座南國小島上出生的。長期以來，島上農家辛苦培育的牛隻被送走、換上別人的名字出道，石垣本地反倒沒有屬於自己的品牌。這樣的情況默默持續了幾十年。
    
    直到2000年，命運的齒輪才開始轉動。那一年，G8高峰會在沖縄舉辦，各國元首雲集的晚宴主菜，正是石垣牛。消息一公開，全日本都震驚了——「原來這麼了不起的牛，就在沖縄最南端的離島上！」從那之後，石垣牛搖身一變，成為備受矚目的高級品牌和牛，並於2008年正式取得地域團體商標認定。
    
    石垣牛的美味秘訣藏在這裡的氣候裡。沖縄全年溫暖，牛隻在低壓力的環境下慢慢長大，不需要對抗嚴冬，也不必蜷縮在陰暗的牛舍裡。悠閒的成長環境讓肉質的油花分布均勻，卻又不過分油膩，吃起來有淡淡的甜味和豐富的鮮味。行家吃法只需撒上薄薄一層鹽，就能感受到最純粹的滋味，根本停不下來。
    
    現在島上有七十多家燒肉店，各自詮釋石垣牛的魅力。不管是A5等級的稀有部位，還是老饕才懂的內臟料理，在這裡都找得到。點一份石垣牛、配上一杯冰涼的奧利安啤酒，看著炭火輕輕燒著油花慢慢化開，你正在吃的，正是日本和牛世界的源頭。
  observationPrompt: "菜單上的石垣牛標示了哪個等級（A4還是A5）？問問店員，今天端上來的牛是在島內哪個牧場長大的——每個牧場的飼育方式不同，看看你能不能從肉的風味裡嚐出差異。"
