    note: "2000年G8沖縄サミットの晩餐会メインディッシュに採用されたことで一躍全国区に。元来、松阪牛・近江牛など全国ブランド牛の素牛産地として知られ、日本和牛のルーツとも言われる歴史的重要産地。"
    sources: [jp-ishigaki-ishigaki-beef-source]
  distinctiveness:
    score: 5
    note: "石垣島でしか食べられない地産地消の高級和牛体験。同じ石垣牛でも本土流通品と現地直送では鮮度と価格が段違いで、島内70軒超の焼肉店が独自の個性を競う唯一無二の食文化エリア。"
    sources: [jp-ishigaki-ishigaki-beef-source]
  interpretability:
    score: 5
    note: "特別な予備知識がなくても、注文して食べるだけで石垣牛の魅力が体感できる。店員に話しかけるとブランド牛の歴史や産地の話を聞かせてもらえることも多い。"
    sources: [jp-ishigaki-ishigaki-beef-source]
  visitorValue:
