  title: "石垣やいま村"
  summary: "走進這片紅瓦古民家聚落，百年前八重山士族的生活氣息撲面而來——這是日本最南端的文化主題公園，四棟國家認定有形文化財古民家、60隻松鼠猴與名蔵灣落日共存一地，是石垣島最有靈魂的景點。"
  narration: |
    站在石垣やいま村的入口，你會先聽到三線琴悠揚的旋律從紅瓦古厝間飄來。這裡是日本最南端、最西端的主題樂園，但比起「樂園」，它更像是一個活生生的時光膠囊，把一百多年前八重山群島的日常生活封存在名蔵灣旁的小山丘上。
    
    這個地方的故事要從1981年說起。當時名古屋鐵道集團在此開設「八重山民俗園」，2008年完成四棟百年古民家的修繕遷建後，正式更名為「石垣やいま村」，這四棟建築也同步被列為日本國家登錄有形文化財。
    
    每棟古民家都有驚人的身世。建於1907年的大濱家，屋主大濱信泉後來成為早稻田大學第七任校長；建於1909年的森田家則是舊士族的宅邸。最讓工匠嘆服的是建於1923年的牧志家——整棟建築完全不用一根釘子，靠著「貫木工法」讓木柱與橫樑相互咬合。在颱風與地震頻繁的島嶼上，這種彈性結構反而比硬釘更能吸收衝擊，先人的智慧令人折服。
    
    園內農家展示了昔日用水牛拉磨榨甘蔗汁的器具，漁師之家則陳列著薩巴尼木造漁船與捕海龜的古老工具，讓人得以一窺這座島嶼曾經依賴海與田維生的歲月。此外，園裡有超過60隻黑帽松鼠猴在接近自然的環境裡自由生活，偶爾會直接跳上遊客的肩膀；在救護設施裡靜養的冠鷲，是石垣島的代表性珍貴猛禽，難得可以近距離凝視牠的眼睛。
    
    往園外遠眺，名蔵灣的落日是沖縄出名的美景，而灣畔的名蔵アンパル紅樹林更被納入拉姆薩爾濕地公約。這裡不只是歷史，更是整個八重山靈魂的縮影。
  observationPrompt: "站在牧志家前，仔細看看柱子與橫樑的接合處——你能找到任何一根釘子嗎？這棟百年古厝是靠什麼方法讓木頭咬住木頭、撐過無數颱風的？"
