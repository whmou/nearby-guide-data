  title: "仲間川マングローブクルーズ"
  summary: "日本最大の紅樹林就藏在西表島的仲間川——搭遊覽船穿梭翠綠水道，感受2021年UNESCO世界自然遺產認定的熱帶秘境，還有樹齡近三百年的巨木等著你在河道盡頭現身。"
  narration: |
    你知道嗎，日本其實有一片幾乎不為人知的亞熱帶原始雨林，全島超過九成的土地都還是未開發的叢林？那就是西表島——而仲間川，就是進入這座神秘島嶼最精采的那扇門。
    
    從大原港出發，遊覽船緩緩駛入仲間川，兩岸的紅樹林幾乎立刻把天空遮住大半。這片林子規模到底有多驚人？面積高達158公頃，佔了全日本紅樹林總面積整整四分之一，是名副其實的日本第一。早在1972年——也就是沖縄剛剛回歸日本的那一年——這裡就被指定為國家天然記念物了，足見生態地位之崇高。
    
    河裡生長著六種不同的紅樹植物，其中有一種叫「マヤプシキ」，整個日本只在西表島東部才找得到，是極其珍稀的在地物種。仔細看那些伸入水面的奇特根系——支柱根像蜘蛛腳般撐起樹身，呼吸根則像吸管一樣從泥地向上突出，呼吸著空氣。這是紅樹林為了在潮汐交替、鹽分充足的嚴苛環境裡存活，歷經漫長演化才練成的求生絕招。
    
    船行到轉折處，有棵讓人瞠目結舌的大樹靜靜等著你——「サキシマスオウノキ」，推估樹齡將近三百年，板根如同巨型裙擺攤開在地，氣勢如電影場景，名列日本「森の巨人たち百選」。站在它面前，你很難不感到某種被時間壓過的渺小。
    
    2021年，西表島正式以「奄美大島、徳之島、沖縄島北部及び西表島」之名列入UNESCO世界自然遺產。仲間川流域正是這份遺產裡最原始、最核心的一塊。搭一趟船，就能親眼走進一個在現代都市外幾乎被時間遺忘的熱帶原始世界。
  observationPrompt: "仔細觀察兩岸紅樹林的根部——你能同時找到「支柱根」（從樹幹斜伸入水中、支撐樹身的根）和「呼吸根」（從泥地向上突出如細管、用來呼吸空氣的根）嗎？看看哪種樹用哪種根。"
