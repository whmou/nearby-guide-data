  title: "唐人墓"
  summary: "一段藏在南島豔陽下的血淚史——1852年被販賣的四百名中國苦力漂流至此，一百二十八人長眠異鄉，七彩牌坊背後是你意想不到的深沉故事。"
  narration: |
    站在這座色彩鮮豔的中式牌坊前，你可能很難想像，這片寧靜海岸邊，曾發生過一段令人心酸的歷史。
    
    時間回到1852年，一艘美國船「羅伯特鮑恩號」從中國廈門出發，船上擠滿了大約四百名被販賣的中國苦力。他們被稱作「豬仔」，以騙術或強迫方式送上船，準備前往美國加利福尼亞州充當廉價勞工。在漫長的海上航程中，苦力們忍受著非人的虐待，終於忍無可忍，在船上發動了反抗。然而命運弄人，船在慌亂中觸礁，漂至石垣島外海，三百八十名苦力就這樣上了岸。
    
    按照當時的琉球王府規定，外國漂流者應予保護。島民與官吏盡力照料這批衣不蔽體、精疲力竭的中國人，把他們安置在臨時設施裡。但好景不長，幾個月後，英國軍艦出現了——以平息「暴亂」為由，對拘留設施展開砲擊，一百多人當場罹難。剩下的人在嚴苛的環境中苦撐，有人病死，有人絕望自盡，最後只有一百七十二人在1853年被遣返中國。一百二十八人，就此長眠於這片陌生的南島土地上。
    
    一百多年後，1971年，這座「唐人墓」才終於落成，告慰長久無人祭掃的亡魂。墓碑上那幾行剛勁有力的漢字題詞，是台灣的蔣中正（蔣介石）親筆所書。五彩繽紛的陶瓷裝飾、飛翹的閩南式屋簷，讓這座墓在南國豔陽下顯得格外莊嚴醒目。墓園一隅還悄悄藏著另一座二戰紀念碑，不同年代的犧牲，靜靜並列在同一片土地上。
    
    每次微風從珊瑚礁海岸吹來，帶著的或許不只是鹹味，還有那些沒能回家的人，穿越百年留下的一聲嘆息。
  observationPrompt: "找找看墓碑上的漢字題詞——這幾個大字是由誰親筆書寫的？他是哪個國家的領導人，又為何與這座遠在日本離島的中國人之墓有所連結？"
