  title: "八重山そば"
  summary: "一碗清澈的湯，藏著琉球王國時代的中國記憶。八重山そば以纖細圓直麵配豬骨鰹魚清湯，撒上只有在地才有的島胡椒「ピパーツ」，是石垣島人日日離不開的靈魂美食，也是一段活生生的歷史旅行。"
  narration: |
    走進石垣市老街，空氣裡飄著一股若有似無的鰹魚香，你就知道快到了。
    
    八重山そば的故事，比你想象的還要古老。學者們追溯到琉球王國時代，福建省的商人帶著製麵技術渡過黑潮，在這個亞熱帶群島留下了屬於中國的麵食記憶。但八重山人沒有照單全收——他們用島上容易取得的豬骨和鰹魚熬出湯底，加上纖細的圓形直麵，再鋪上醬汁燉煮過的瘦豬肉和薄切魚板，就這樣一代傳一代，揉出了屬於自己的風味。
    
    和沖繩本島的そば比起來，八重山そば更細、更直、湯頭更清，像南海的陽光一樣，明亮而不刺眼。明治時代，麵食文化從那覇慢慢流傳到最南端的八重山諸島，但走著走著就走出了自己的路——這或許就是島嶼文化的本質：接受外來，卻始終保有自己。
    
    石垣市老町的「来夏世」（くなつゆ）是許多人心目中最正統的一碗。這個店名本身就藏著一個祈願——在八重山話裡，「来夏世」意味著「豐收的夏天降臨」，願五穀豐穰、萬事繁盛。踏入木造古民家，昏黃的燈光映著陶碗，湯頭端上來清澈得幾乎透明，但那口感之豐富，讓人愣了一下才回過神。
    
    別忘了桌上那罐小小的「ピパーツ」——那是八重山特有的島胡椒，帶著微微的花椒香氣和柑橘尾韻，是沖繩本島買不到的秘密香料。撒上一點，這碗湯立刻活了起來，層次一下深了好幾倍。
    
    石垣島人幾乎從小喝到大，有些老店規定「湯賣完就收攤」，每天中午前就掛起「本日終了」的牌子。這不是噱頭，是對食材最純粹的尊重。趁早來，才能喝到最好的那一碗。
  observationPrompt: "仔細端詳碗裡的麵條——它的截面是圓的還是扁的？和你平常吃到的拉麵有何不同？再找找桌上有沒有「ピパーツ」（島胡椒），試試撒上前後這碗湯的味道有什麼變化？"
