ratingEvidence:
  rubricVersion: 1
  significance:
    score: 5
    note: "八重山そばは石垣島を代表する郷土料理であり、琉球王国時代に中国から伝わった製麵文化を基盤に、独自の進化を遂げた地域固有の食文化遺産。沖縄本島のそばとは異なる細くストレートな丸麺と、ピパーツ（島胡椒）という固有香辛料が特色。"
    sources: [jp-ishigaki-yaeyama-soba-source]
  distinctiveness:
    score: 5
    note: "八重山群島限定的飲食文化，圓形直麵、清澈豬骨鰹魚湯底、島胡椒「ピパーツ」三者組合在沖繩本島與日本其他地方均無法複製，是名副其實只有在石垣島才能吃到的一碗麵。"
    sources: [jp-ishigaki-yaeyama-soba-source]
  interpretability:
    score: 4
    note: "食物本身直觀易懂，但麵條形狀差異、ピパーツ的使用方式、以及店名文化涵義等深層脈絡，需要在地嚮導解說才能充分體會；現場仍有菜單說明可輔助理解。"
    sources: [jp-ishigaki-yaeyama-soba-source]
  visitorValue:
    score: 5
    note: "一碗約600-800日圓，物超所值；老舍「来夏世」每日上午10點開始營業、售完即止，建議10:30前抵達。石垣市中心步行即可到達多家名店，停留時間約30-60分鐘。"
    sources: [jp-ishigaki-yaeyama-soba-source]
