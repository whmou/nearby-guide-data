  title: "小浜島（こはまじま）"
  summary: "石垣港から高速船わずか30分——NHK晨間劇《ちゅらさん》的故鄉，甘蔗田筆直延伸向天際，平均年齡84歲的阿嬤偶像團體在此登台，時間在這座小島上彷彿靜止了。"
  narration: |
    站在這片翠綠的甘蔗田旁，你能感受到小浜島和石垣島完全不同的節奏——這裡的時間，好像走得特別慢。
    
    小浜島面積只有大約八平方公里，人口不到七百人，卻在2001年因為NHK晨間劇《ちゅらさん》（意思是「美麗的人」）一炮而紅。故事描述在島上長大的少女惠里，從這片甘蔗田出發，走向廣大的世界。劇中主角一家居住的「こはぐら荘」，至今仍保留著傳統琉球建築的樣貌——珊瑚石砌成的圍牆、古老的橘紅屋瓦，很多日本人專程坐船過來，只為站在門口拍一張照。
    
    說到甘蔗，島上最有名的地標就是「Sugar Road」——一條筆直穿越甘蔗田的道路，兩側的甘蔗葉隨風搖曳，藍天與綠浪交織出一幅讓人不想離開的風景。這條路也是《ちゅらさん》的取景地之一，走在上面，彷彿能看見劇中主角奔跑的身影。
    
    但讓小浜島真正讓人心疼的，是一個叫KBG84的女子團體。KBG是「こはまじま・ばあちゃん・合唱団」的縮寫，84是她們的平均年齡，最高齡曾達97歲。入團條件只有三個：住在小浜島、是女性、超過八十歲。這些阿嬤穿上親手織的芭蕉布、登上舞台唱歌跳舞。因為年輕時遭逢戰亂，很多人沒能穿上嫁衣，所以入團典禮特別讓她們穿婚紗拍紀念照——那一幕，讓無數看到的人紅了眼眶。
    
    島上最高點烏不岳（Ufudaki）只有99公尺，但站在瞭望台遠眺，西表島就在眼前，海風一吹，什麼煩惱都散了。2007年，島上的盂蘭盆舞與結願祭、種子取祭等傳統表演藝術，更被指定為日本重要無形民俗文化財。
    
    這座小島教會人一件事：人生的美好，不在於快，而在於深。
  observationPrompt: "走到Sugar Road的甘蔗田中間，往道路盡頭望去——你能看見遠方哪座島嶼的輪廓浮現在海平面上？"
