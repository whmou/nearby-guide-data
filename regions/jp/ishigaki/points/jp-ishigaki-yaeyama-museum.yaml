  title: "石垣市立八重山博物館"
  summary: "只要200日圓，就能在這裡讀懂八重山群島的千年身世：人頭稅的沉重歷史、已失傳的帕納里陶、南方漂來的無名獨木舟，每一件靜靜陳列的文物背後，都是一個無聲卻震撼人心的故事。"
  narration: |
    站在這棟樸實的建築前，你可能不會想到，眼前這間入場費只要200日圓的小博物館，藏著整個八重山群島數百年的悲歡離合。
    
    八重山博物館開館於1972年，正是沖繩回歸日本的那一年。這個時間點本身就意味深長——在長達27年的美軍統治結束後，石垣人選擇用一座博物館來宣告自己的文化身份認同。館址原本就是石垣市役所的舊址，可以說是從行政中心蛻變成了文化的守護者。
    
    走進館內，最讓人動容的，是那些與「人頭稅」有關的文物。從古琉球時代一直到1903年明治政府廢止為止，八重山每個15歲到50歲的人都要繳稅——男人繳穀物，女人繳織物。那些女人一絲一線織出來的，就是現在被列為重要文化財的「八重山上布」。在琉球王府官員的監視下織布繳稅，那雙手既是生計，也是枷鎖。如今這些布料靜靜陳列在玻璃櫃裡，卻讓人感受到一種無聲的重量。
    
    館內還收藏了一艘從南方漂來的「くり舟」——用整塊原木挖鑿而成的獨木舟。沒有人知道它從哪裡出發，也不知道經歷了多少風浪才擱淺在八重山的海岸。這艘無名的舟，無聲訴說著南島文化圈之間那些說不清道不明的聯繫。
    
    而「パナリ焼」（新城島燒）這種已經失傳的陶器，如今只能在這裡見到實物。那粗獷質樸的釉面，承載著離島居民面對大海的倔強與韌性。
    
    整個博物館藏品約兩萬件，常設展只精選約600件展出。如果你想在出發去西表島或竹富島之前，先把這片群島的靈魂稍稍讀懂一些——這裡，就是最好的起點。
  observationPrompt: "館內展示的八重山上布，是古代女性用雙手織出來當稅金繳給琉球王府的「御用布」——仔細看看那些細密的圖案，想想一位古代石垣女性究竟要花多少時間，才能織完一匹布來換取一年的免稅？"
