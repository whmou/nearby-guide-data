  title: "吉野海岸"
  summary: "吉野海岸是日本數一數二的浮潛聖地，近岸即有密集珊瑚礁群，海龜出沒頻繁，透明度極高的海水讓水中世界一覽無遺。"
  narration: |
    吉野海岸位於宮古島東岸，是全日本公認最頂級的浮潛地點之一。走入海中短短幾步，腳下便是色彩繽紛的珊瑚礁群，魚群穿梭其間，生機盎然。這裡最讓人驚喜的，是綠蠵龜幾乎每天都會在礁盤附近悠游覓食，與牠們相遇幾乎成了常態。海水透明度通常超過二十公尺，肉眼便能看清礁盤的細節。海灘本身為礫石與珊瑚砂混合，停車場和小賣店一應俱全，是自由行旅客無需報名潛水行程、也能獨立體驗宮古島海洋奇景的理想地點。浮潛時切記不要踩踏珊瑚，保護這片寶貴的自然資產。
  observationPrompt: "站在海邊向外看，你能數出水下有幾種不同顏色的珊瑚？留意有沒有綠蠵龜從礁盤旁緩緩游過。"
