  title: "池間大橋"
  summary: "全長1,425公尺，連接宮古島北端與池間島，橋上可以欣賞宮古島西北海域最鮮豔的淺海藍綠色調，是日落攝影的熱門地點。"
  narration: |
    池間大橋建於1992年，是宮古島最早完工的跨海橋梁之一，連接宮古島北端與小島池間島。橋長一千四百二十五公尺，與伊良部大橋相比較短，但橋兩側海域水深更淺，珊瑚礁平台的翠綠色澤比任何地方都更鮮豔飽和。橋頭附近有一處廣受攝影師青睞的觀景台，傍晚夕陽西沉時，橋身倒映在近岸的淺海上，構成宮古島最廣為流傳的落日意象之一。過橋進入池間島，可以繞島一圈，感受小漁村的寧靜生活步調。
  observationPrompt: "在橋面往下看——兩側海水的顏色一樣嗎？仔細比較北側和南側的藍綠深淺，是什麼造成差異？"
