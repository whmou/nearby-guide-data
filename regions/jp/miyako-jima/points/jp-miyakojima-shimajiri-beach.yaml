  kind: attraction
  title: "前浜東岸"
  summary: "前浜海灘東段是與那霸前浜7公里長沙灘的較安靜區域，遊客較少，是欣賞宮古島日出的絕佳地點，清晨時分金色光芒映照在宮古藍海面上景色迷人。"
  narration: |
    與那霸前浜是日本最美海灘排行榜的常客，但多數遊客只到達靠近停車場的中西段，東岸這一帶反而保留了一分清幽。這裡的沙灘同樣細白如粉，海水同樣清澈見底，卻少了人潮的喧嚷。清晨時分，東方天際逐漸泛紅，陽光從地平線升起的第一道光線便會灑落在這片海面上，海水從墨藍轉為橙金、再化為翠藍，短短半小時之內呈現三種截然不同的色調。這裡也是浮潛的好地方，珊瑚礁緊鄰沙灘外緣，熱帶魚豐富。若想在前浜找到屬於自己的一片靜謐，請往東走。
  observationPrompt: "觀察東岸沙灘上的沙粒紋路——是否能看到退潮留下的波浪紋？試著找找看沙灘上有沒有貝殼或珊瑚碎片，辨認看看是哪種貝類。"
