  title: "保良泉"
  summary: "保良泉是宮古島南岸的天然淡水湧泉奇景，泉水在海岸邊與海水交會，形成可入內探索的鐘乳石洞穴，並提供絕佳的海岸浮潛體驗。"
  narration: |
    保良泉（ほらがー）是宮古島南部海岸最神奇的自然景觀之一。這裡的天然泉水從石灰岩地層滲出，在海邊形成淡水與海水交融的獨特環境。更難得的是，泉水出口附近發育了可供遊客進入的鐘乳石洞穴，洞內鐘乳石與石筍發育完整，滴水聲在幽暗洞室中迴響，令人印象深刻。洞穴出口緊鄰宮古藍的海岸，出洞後即可換裝下水浮潛，珊瑚礁和熱帶魚近在眼前。由於保良泉需要購票進入，且有專人解說與安全管理，整體體驗品質穩定。淡水湧泉與鐘乳石洞的組合，在宮古島眾多自然景點中堪稱最具震撼力的地質奇景。
  observationPrompt: "在洞穴內抬頭仰望，你能分辨哪些是向下生長的鐘乳石、哪些是向上生長的石筍嗎？聆聽水滴聲，感受洞內的溫度與外面海風的差異。"
  countryCode: JP
