  title: "東平安名崎"
  summary: "宮古島最東端的岬角，細長的珊瑚礁台地向海中延伸約2公里，燈塔矗立其上，三面臨海的壯闊視野是宮古島最震撼的自然景觀之一。"
  narration: |
    東平安名崎是宮古島向東最遠伸入海中的細長地岬，整個台地由隆起的珊瑚礁構成，走在岬角步道上，兩側都是碧藍海面，海風強勁，蘇鐵與草地在海風中低伏。岬角末端的平安名崎燈塔建於1967年，白色燈塔在陽光下格外耀眼，可以登塔俯瞰整個岬角的細長輪廓延伸至海平線。這裡幾乎沒有遮蔭，建議早上或傍晚前來，夕陽時分，海面從湛藍轉為橙金，是宮古島公認最美的落日觀賞地點之一。
  observationPrompt: "站在燈塔旁往北望，能在海面上隱約看到池間島的輪廓嗎？在晴天，更遠處的伊良部島也有機會入鏡。"
