  kind: attraction
  title: "宮古島市熱帯植物園"
  summary: "宮古島市熱帶植物園收集超過一千種熱帶植物，是宮古島市區少見的綠色休憩空間，適合親子同遊與靜態漫步。"
  narration: |
    宮古島市熱帶植物園坐落於市區邊緣的緩丘地帶，園內廣植來自世界各地的熱帶植物，包含巨大的橡膠樹、色彩奪目的熱帶花卉、以及各類棕櫚科植物，超過一千種之多。這裡對市民與遊客免費開放，平日人潮不多，是旅途中難得可以放鬆腳步、感受綠意的場所。園區設有步道，繞行一圈約需三十分鐘。遊客有時能在林蔭下遇見宮古島特有的野鳥，或在角落發現外形奇特的熱帶果樹。相較於島上以海景為主的觀光點，這裡提供截然不同的陸地生態視角，是認識宮古島植被多樣性的好機會。
  observationPrompt: "在園內找找看有沒有結果實的熱帶植物，你能認出果實的種類嗎？留意樹幹的紋路與葉片的形狀，和台灣常見的熱帶植物有什麼不同？"
