  title: "島尻のマングローブ林"
  summary: "島尻紅樹林是宮古島南部最大的紅樹林濕地，可乘坐獨木舟深入林中水道，是感受宮古島熱帶生態系的沉浸式體驗。"
  narration: |
    島尻紅樹林位於宮古島南端，是島上面積最大的紅樹林生態區，以可以划獨木舟深入其中著稱。乘坐獨木舟穿行於蜿蜒水道之間，兩岸高大的海茄苳與水筆仔根系如巨大的手掌伸入水中，光線在頭頂葉冠間碎散，形成如夢似幻的綠色隧道。水面下常可見到彈塗魚、招潮蟹及各種小型魚類，生態多樣性令人驚嘆。導覽人員會沿途解說紅樹林的生態功能，包括它如何防護海岸、育養幼魚，以及作為碳匯在氣候調節中扮演的角色。這是一種截然不同於宮古島珊瑚礁體驗的自然旅程，靜謐、神秘，適合希望親近熱帶濕地生態的旅客。
  observationPrompt: "在獨木舟上低頭觀察水面，你能看到招潮蟹舉起大螯揮舞嗎？留意樹根之間有沒有幼魚在淺水區游動。"
