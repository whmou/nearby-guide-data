  title: "海人の森"
  summary: "海人の森是宮古島難得一見的紅樹林濕地，設有木棧道供遊客步行其中，靜謐的水林環境展現宮古島鮮為人知的生態面貌。"
  narration: |
    海人の森，漢字意為「海人之森」，是宮古島上保存較完整的紅樹林生態區之一。一條木製棧道蜿蜒穿越茂密的紅樹林，遊客可以免費步行其中，俯瞰林間的潮溝水道。紅樹林根系盤錯交纏，在海水與淡水交會的環境中支撐起獨特的生態系統，蟹類、彈塗魚與多種鳥類在此棲息。宮古島以海洋景色著稱，但這片靜謐的林地提供截然不同的感官體驗——光線在樹葉縫隙間過濾，水面倒映著綠意，隔絕了島上的南國陽光。清晨或黃昏時段，林間鳥鳴聲尤為豐富，是喜歡自然觀察的旅客不可錯過的隱秘之地。
  observationPrompt: "在棧道上靜靜等候片刻，看看能不能發現彈塗魚在泥灘上移動，或是在紅樹林根系之間找到正在覓食的蟹類。"
