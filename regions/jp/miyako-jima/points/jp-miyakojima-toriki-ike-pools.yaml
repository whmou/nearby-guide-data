  kind: attraction
  title: "通り池"
  summary: "下地島西岸的通り池是兩個與海洋地下相連的天然內陸水池，潛水員可從水下洞穴在兩池之間穿越，被列為日本最具震撼力的地形潛水勝地之一，地面上亦可免費欣賞神秘深藍水色。"
  narration: |
    站在通り池的觀景台向下望，兩個幽深的圓形水池嵌在石灰岩岩盤中，水面宛如被截取的一片天空，呈現出令人屏息的靛藍色。這對水池外觀相似，直徑分別約75公尺與55公尺，中間以地面上的岩石稜線分隔，卻在水面下的岩洞中相互連通，更有地下洞穴一路延伸至西岸的大海。換句話說，退潮時海水仍悄悄從地底湧入，讓池水保持令人難以置信的清澈與神秘鹹味。對潛水員而言，從海面潛入、穿越洞穴游進通り池、再仰頭看到兩個光圈從深藍中浮現，是宮古島潛水體驗中最令人動容的一幕。即便不潛水，走在池邊步道的旅人也能看見那無風時如鏡面般靜止、颱風過後卻波濤洶湧的奇特景象。
  observationPrompt: "仔細觀察兩個池面的顏色與波紋——你能看出哪個池水受海浪影響更大，以及兩池之間岩脊下方水流的流動方向嗎？"
