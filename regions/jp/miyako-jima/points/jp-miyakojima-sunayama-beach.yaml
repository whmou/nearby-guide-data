  significance:
    score: 4
    note: "宮古島代表性自然景觀，拱形岩石是宮古島觀光的標誌性意象，廣泛出現在宮古島旅遊宣傳素材。"
    sources: [sunayama-miyakojima-guide]
  distinctiveness:
    score: 5
    note: "天然珊瑚礁拱岩造型獨一無二，是宮古島無可取代的自然地標，世界各地極少有類似尺度的海灘拱石。"
    sources: [sunayama-miyakojima-guide]
  interpretability:
    score: 4
    note: "拱岩形態清晰易辨，視覺震撼自明，地質成因（珊瑚礁受海浪侵蝕）可透過觀察岩石紋理推敲。"
    sources: [sunayama-miyakojima-guide]
  visitorValue:
