  kind: attraction
  title: "砂山ビーチ（砂山海灘）"
  summary: "以巨大天然拱形岩石聞名的秘境海灘，穿越拱岩後是一片安靜的珊瑚沙灣，拱岩本身是宮古島最具辨識度的自然地標之一。"
  narration: |
    砂山海灘得名於入口處那座高聳的沙丘，停好車後沿階梯翻越一座沙丘，便可俯瞰整個海灣。海灘中央矗立著一塊天然形成的拱形岩石，珊瑚岩被海浪侵蝕成圓弧形，陽光從拱洞打進來，形成只有在特定角度才能拍到的絕美構圖。拱岩兩側的海水格外清澈，珊瑚礁碎石讓海底紋理清晰可見。這裡的海流比与那覇前浜稍強，非游泳季節或浪大時需謹慎，但單純欣賞拱岩和在海灘散步完全不受影響。
  observationPrompt: "站在拱岩正前方，找到讓拱框住遠方海面的位置——試試看正午和下午的光線角度有什麼不同？"
