  kind: attraction
  title: "下地島17エンド"
  summary: "17ENDは下地島空港滑走路17號跑道終點延伸至海灘的特殊觀景點，旅客可在白沙灘上仰望飛機從頭頂僅數十公尺低空飛越降落，是社群媒體上極具話題性的宮古島絕景。"
  narration: |
    「17END」這個名稱來自下地島空港跑道的編號——第17號跑道的降落端，正好就落在這片面向宮古海峽的白沙灘上。當飛機準備著陸時，從正面筆直飛來，越過沙灘上方數十公尺的低空切入，發動機的轟鳴聲、機腹上清晰可見的輪胎架、以及碧藍海面與飛機身影疊合的畫面，構成了宮古島最令人心跳加速的攝影機位。這個地點從原本的飛行訓練觀察地，隨著社群媒體的傳播成為全國矚目的打卡熱點，吸引航空迷、攝影愛好者和一般旅客特地驅車前來。沙灘本身也頗為美麗，寬闊的白沙與透明海水即使沒有飛機也值得造訪。飛機起降的時間表可事先查詢，挑好時段前來，就能拍下這張宮古島最獨特的航空海景。
  observationPrompt: "當飛機從正面飛來時，試著注意機腹收起的起落架輪胎與機翼下方的細節——你能看清楚哪家航空公司的塗裝嗎？"
