  title: "池間島ジュゴン生息域"
  summary: "池間島周邊海域是宮古群島中已確認儒艮（海牛）存在的唯一區域，環境省列為重要保護海域，偶有目擊報告，是日本境內難得一見的哺乳類海洋動物棲息環境。"
  narration: |
    儒艮是一種體型龐大的草食性海洋哺乳動物，全球數量急劇減少，在日本幾乎已瀕臨絕跡。然而在宮古島池間島周邊的淺灣海草床，牠們仍留有蹤跡。環境省的調查記錄顯示，此區域偶有個體出沒，以海底豐富的海草為食，留下橢圓形的啃食痕跡。儒艮的移動速度緩慢，通常在黎明或黃昏時於淺灘附近覓食，肉眼觀察極為困難，但當地漁民偶爾在出海時目擊到其大型灰褐色身影在水面露出呼吸。為了保護這片珍貴棲地，池間島海域部分區域限制漁業活動與水上摩托車，水下噪音管制也被納入討論。站在池間島北岸眺望，那片看似平靜的海面下，或許正有著這種古老海洋生靈悄悄游動。
  observationPrompt: "在退潮後的海草床區域，俯身細看沙底——你能發現寬約30至50公分、橢圓形草根被拔起的痕跡嗎？那正是儒艮獨特的進食方式所留下的「牧食痕」。"
