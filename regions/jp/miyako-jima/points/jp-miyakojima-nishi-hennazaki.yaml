  title: "西平安名崎"
  summary: "宮古島西北端的岬角，以白色風力發電機矗立於珊瑚礁海岸線著稱，是宮古島欣賞夕陽西沉入海的最佳地點之一。"
  narration: |
    西平安名崎是宮古島伸向西北的岬角，與東平安名崎一樣由隆起的珊瑚礁台地構成，但景致迥異。這裡矗立著數座白色風力發電機，葉片在海風中緩緩旋轉，與蔚藍海面和綠色草地形成構圖乾淨的背景。傍晚是造訪的最佳時機：太陽順著西北方向緩緩西沉，橘紅色光芒鋪滿整個海面，風機葉片的剪影在夕照中格外優雅。春季波照間花（バイカイカリソウ）盛開時，地面鋪滿淡粉紫色小花，是另一季節的特別風景。
  observationPrompt: "觀察風力發電機的葉片旋轉方向——今天的海風是從哪個方向吹來的？和你的預期一樣嗎？"
