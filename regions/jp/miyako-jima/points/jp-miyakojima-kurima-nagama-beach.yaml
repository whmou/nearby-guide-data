  kind: attraction
  title: "長間浜"
  summary: "長間浜是来間島南岸的一片原始白沙灘，因地處偏僻而少有觀光客，海水清澈見底、沙粒細白如粉，被譽為宮古島最秘境的海灘之一。"
  narration: |
    穿過来間島內蜿蜒的小徑，眼前突然出現一彎弧形的純白沙灘，那就是長間浜。這裡沒有遮陽傘出租，也沒有沙灘小屋，只有海風、白沙、與令人屏息的宮古藍。由於位於島的南岸，遊客必須步行或騎單車才能抵達，正因如此，這片沙灘保留了最純粹的樣貌。海水淺灘區清澈到可以直接看到腳下每顆沙粒，珊瑚礁就散布在外海。退潮時，沙灘面積倍增，可以漫步其上，感受腳底細沙的柔軟。來到長間浜，請帶好飲水與防曬，靜靜享受屬於自己的宮古島秘境時光。
  observationPrompt: "仔細觀察長間浜的沙粒——比起一般海灘的沙，你覺得這裡的沙粒更細、更白，還是顏色偏米黃？試著找找沙灘上是否有細小的珊瑚碎片。"
