  title: "池間島"
  summary: "池間島是透過池間大橋與宮古島北端相連的小島，面積僅約2.83平方公里，以周邊海域可能出沒的儒艮（海牛）和傳統漁村風情聞名，是宮古島旅行中最具靜謐感的離島之一。"
  narration: |
    沿著宮古島北端的海岸線行駛，穿越池間大橋之後，車速自然放慢下來。池間島的路很窄，房屋低矮，漁港邊停著幾艘小船，民宿門口晾著捕魚的工具——這裡與宮古島市區的熱鬧氛圍截然不同，更像是一個還沒被大量觀光業改變的傳統琉球漁村。島嶼東北側的濕地是全球瀕危物種儒艮的覓食區域之一，雖然目擁僅靠運氣，但這份期待本身就為這座小島增添了神秘與珍貴的光環。島上的池間漁業協同組合販售現撈海產，冬季來訪的旅人還可以品嚐到宮古島名產「鰹魚」的各種料理。繞行小島一圈不過十分鐘的車程，卻能感受到與宮古島截然不同的漁村韻味。
  observationPrompt: "走到島的北側海岸，低頭看礁盤與沙底的交界處——你能看到任何海草床（藻場）嗎？那正是儒艮的主要食物來源。"
