ratingEvidence:
  rubricVersion: 1
  significance:
    score: 4
    note: "宮古島信仰文化的核心聖地，嚴格的禁忌傳統保存至今，是琉球文化中神聖小島信仰的重要活案例。"
    sources: [ogami-wikipedia-ja, miyakojima-kanko-ogami]
  distinctiveness:
    score: 5
    note: "禁止機動車輛、部分聖地禁止外人進入的雙重限制在日本觀光島嶼中極為罕見，靈性氛圍高度獨特。"
    sources: [ogami-wikipedia-ja]
  interpretability:
    score: 3
    note: "禁忌傳統與御嶽文化需要背景知識才能深入理解，但島嶼整體氛圍直觀地傳遞了其神聖性。"
    sources: [ogami-wikipedia-ja]
  visitorValue:
    score: 3
    note: "渡輪需付費，班次有限（每日約數班），訪客受限較多，但對追求深度文化體驗的旅人而言價值極高。"
    sources: [miyakojima-kanko-ogami]
  evidenceQuality:
