  title: "大神島"
  summary: "大神島是宮古島東北方的神聖小島，禁止任何機動車輛進入，僅可搭渡輪抵達，島上存在嚴格的聖地禁忌，部分區域連當地居民也不得踏入，是宮古群島中靈性氛圍最濃厚的秘境。"
  narration: |
    從宮古島北端的島尻港搭上小型渡輪，不消二十分鐘便能遠遠看見大神島那隆起的巨石輪廓從海面浮現。這座面積不足0.2平方公里的小島，長期以來在宮古島人的信仰中佔有特殊地位——島上有多處稱為「ウタキ（御嶽）」的聖地，按照傳統規定，外來者不得接近，甚至島上的部分祭典也禁止外人觀看。島嶼四周沒有汽車、機車的轟鳴聲，只有海風與浪聲，以及偶爾響起的島民呼喚聲。巨石林立的海岸線與覆蓋丘頂的熱帶植被，讓這座小島散發出一種不屬於現代旅遊版圖的神秘氣質。人口僅數十人的小村落保有傳統石砌圍牆，港口邊停著老舊的漁船。拜訪大神島的基本禮節是：不亂走、不拍攝他人、不觸碰明顯標示的神聖石頭，以虔敬而安靜的心態接觸這片土地的靈性傳統。
  observationPrompt: "走在島上步道時，留意路旁是否有繩結或石堆標示的禁止進入區域——這些就是傳統御嶽聖地的邊界，試著觀察島民如何在日常生活中自然地維持這些界線。"
