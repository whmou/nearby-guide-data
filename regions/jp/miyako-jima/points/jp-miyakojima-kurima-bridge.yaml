  title: "来間大橋"
  summary: "全長1,690公尺的来間大橋連接宮古島與来間島，橋面兩側視野開闊，可俯瞰宮古藍海水與前浜海灘的壯麗景色。1995年通車，是宮古島具代表性的跨海大橋之一。"
  narration: |
    来間大橋是一座全長1,690公尺的跨海大橋，自1995年通車以來一直是宮古島的重要地標。踏上橋面，兩側是一望無際的宮古藍——那是一種介於翡翠綠與鈷藍之間、只有宮古島才有的獨特色調。橋的北側可遠眺被評為日本最美海灘之一的與那霸前浜，海天一色的景致讓人心曠神怡。大橋本身設有步行道，許多旅客選擇在此停車步行，感受海風拂面、橋下波光粼粼的寧靜時光。橋的另一端即是安靜的来間島，等待著您深入探訪。
  observationPrompt: "站在橋面上，往北望向前浜方向，注意看看海水顏色如何從橋下的深藍漸層變化到淺灘的翡翠綠——能說出幾種不同的藍？"
