  title: "砂川御嶽"
  summary: "砂川御嶽是宮古島砂川地區一處傳統琉球聖地，密林中的石灰岩聖壇保留著宮古島原住民信仰的核心精神，是感受宮古島古老宗教文化的重要場所。"
  narration: |
    在宮古島，「御嶽」（うたき）是傳統琉球信仰中最神聖的場所，每個村落都有自己守護的御嶽。砂川御嶽藏於砂川地區的雜木林深處，林蔭遮天，陽光只能從葉隙間透入，形成斑駁光影。踏入這片神聖的空間，腳步自然放輕，氣氛肅穆而寧靜。石灰岩堆砌的聖壇前，有時可見當地居民供奉的鮮花與香燭，提醒造訪者這裡至今仍是活躍的信仰場所。宮古島有別於首里城的官方琉球文化，御嶽所承載的是更貼近庶民生活的原生信仰，與自然緊密融合，無需宏偉建築，一塊岩石、一棵老樹，便是神靈棲居之所。請以尊重的態度靜靜感受這份古老的宮古精神。
  observationPrompt: "進入御嶽林地時，注意周圍樹木的種類——是否有榕樹的氣生根或老樟樹的粗壯樹幹？找找看聖壇附近是否有居民留下的供品或繫在樹枝上的繩索。"
