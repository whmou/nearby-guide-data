  title: "来間島サトウキビ畑"
  summary: "来間島的道路兩旁遍布甘蔗田，是宮古島傳統農業景觀的縮影。每年11月至翌年3月為收成季節，可見農機穿梭於田間，感受南島農村的純樸生活節奏。"
  narration: |
    踏上来間島，最先映入眼簾的不是海，而是綿延至天際的甘蔗田。宮古島自古以來就是琉球王朝重要的砂糖產地，而来間島更保留了最完整的甘蔗農業景觀。島上道路狹窄蜿蜒，兩旁的甘蔗在夏季可長到2公尺以上，騎單車穿越其間，彷彿進入了一條綠色隧道。冬季收成期間，甘蔗被切割後直接送往宮古島的製糖工廠，島上空氣中會瀰漫著淡淡的糖蜜甘香。這片看似平凡的農田，承載著宮古島數百年來的歷史記憶，也是今日島民賴以維生的農業根基。
  observationPrompt: "注意看路旁甘蔗莖幹的粗細與節間長度——試著估算一株甘蔗大約有幾個節？找找看田邊是否有種植告示板或農業說明牌。"
