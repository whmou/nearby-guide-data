  title: "カママ嶺公園"
  summary: "カママ嶺公園是宮古島市區附近的小山丘公園，提供俯瞰平良市街與遠海的視角，是當地居民散步健身與欣賞夕陽的熱門地點。"
  narration: |
    カママ嶺公園坐落在平良市區東側的小丘陵上，從這裡可以俯瞰宮古島的市街風貌，視野延伸至遠方的海平面。公園內有整備完善的步道與休憩設施，清晨常見當地居民健走運動，傍晚則成為欣賞夕陽的絕佳地點。站在最高處的展望廣場，可以看見平良港的進出船隻，以及連接伊良部島的大橋輪廓。雖然這裡不是知名觀光勝地，但正因如此，旅客可以在此體驗不刻意包裝的宮古島日常生活氛圍，與當地人一同呼吸島嶼的清新空氣。公園全年免費開放，停車方便，距離市中心僅需幾分鐘車程。
  observationPrompt: "在公園最高點向西方望去，你能看到平良港的停泊船隻嗎？天色若合適，注意觀察海面因光線角度而呈現的色彩變化。"
