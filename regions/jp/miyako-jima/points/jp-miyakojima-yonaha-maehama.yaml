  title: "与那覇前浜"
  summary: "多次榮獲日本最美海灘評比第一的白沙灘，長達7公里的細白沙與透明碧藍海水讓人難以置信這是真實存在的景色。"
  narration: |
    与那覇前浜是宮古島最廣為人知的海灘，長達七公里的弧形白沙海岸線是整個日本最長的白沙灘之一。這裡的沙細如麵粉，走在上面完全沒有粗礫感，而海水的透明度讓你可以清晰看見水下數公尺的沙紋。晴天時，淺水區呈現迷幻的翡翠藍，稍深處漸層轉為靛藍，這種色彩過渡被稱為「宮古藍」。早晨人少時，沙灘倒映出天空的顏色，幾乎分不清海與天的邊界。這裡水流相對平緩，適合游泳，但仍建議在有旗幟指示的安全區域活動。
  observationPrompt: "觀察海水的顏色漸層——從腳邊的翡翠綠到遠處的深藍，能數出幾個明顯的色帶？"
