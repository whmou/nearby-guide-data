  title: "ビャクダン山展望台"
  summary: "ビャクダン山是宮古島的最高點，海拔約113公尺，展望台可俯瞰宮古島全島、伊良部島與周圍珊瑚礁的360度壯觀景色。"
  narration: |
    ビャクダン山展望台矗立在宮古島的最高峰，海拔雖只有113公尺，但由於宮古島地勢低平，這個高度已足以讓視野遼闊無阻。站在展望台上，北方是蔚藍的東海，南方可以望見宮古島南岸礁盤的翠綠色澤，天氣晴朗時甚至能辨認遠處的伊良部大橋和池間大橋。地面上鋪展的是宮古島特有的紅瓦屋頂聚落與甘蔗田，與漸層海色形成鮮明對比。展望台設有觀景說明板，標示出各方向可見的島嶼與地標名稱，幫助旅客辨別方位。日出與日落時分是造訪的最佳時機，天空與海洋的色彩變化令人難以忘懷。
  observationPrompt: "在展望台找到方位說明板，嘗試對照現實景色辨認出伊良部島或池間島的位置——你能看到連結它們的大橋嗎？"
