  title: "来間島"
  summary: "来間島是宮古島西南方一座安靜的小島，面積約2.84平方公里，以甘蔗田、珊瑚礁海灘和崖頂咖啡廳著稱，是宮古島鬧中取靜的單車旅遊首選。"
  narration: |
    渡過来間大橋，喧囂瞬間遠去。来間島是一座面積不到三平方公里的小島，居民數不過數百人，卻藏著宮古島南部最迷人的風景。島上道路起伏，兩旁是一望無際的甘蔗田，微風中飄來淡淡的蔗糖香氣。沿著小徑騎單車環島，不消三十分鐘便能抵達南岸的長間浜——那片幾乎沒有觀光客的純白沙灘，以及面朝前浜的龍宮城展望台。島上有幾間風格獨特的咖啡廳，坐在崖邊一邊享用沖繩甜點，一邊俯瞰宮古藍，是来間島最悠閒的享受方式。
  observationPrompt: "沿島道路騎行時，留意路旁甘蔗的高度——你覺得這些甘蔗大概長了幾個月了？找找看島上有沒有指示牌標示收成季節。"
