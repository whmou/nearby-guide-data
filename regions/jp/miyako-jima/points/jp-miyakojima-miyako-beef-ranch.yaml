  kind: venue
  title: "宮古牛農場"
  summary: "宮古島飼育的宮古牛（黑毛和牛）以海風吹拂的開闊牧場環境與低壓力放牧方式聞名，肉質油花細緻，是宮古島美食體驗中不可錯過的島產和牛。"
  narration: |
    宮古島不只有海，這裡的牧場同樣令人印象深刻。宮古牛是宮古島本地飼育的黑毛和牛品種，在海拔平緩的島內牧場上自由生長，終日沐浴在海風與充足陽光之中。島上的低壓力放牧環境讓牛隻生長緩慢而健康，肌肉紋理細緻，油花分布均勻，造就了宮古牛獨特的柔嫩口感。來到牧場，可以近距離觀察黑毛和牛悠然吃草的日常，感受宮古島農業生活的另一面向。宮古牛在島上的燒肉店與高級餐廳均有供應，是以食物形式認識宮古島土地的最直接方式。如需參觀牧場，建議事先聯繫確認開放時間。
  observationPrompt: "觀察牧場內的牛隻——黑毛和牛的毛色是純黑還是帶有光澤的深棕？注意牠們的耳標顏色與編號，這些是宮古牛個體管理系統的一部分。"
