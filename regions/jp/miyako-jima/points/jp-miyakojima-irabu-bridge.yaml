  title: "伊良部大橋"
  summary: "全長3,540公尺，2015年完工，是日本最長的免費通行橋梁，連接宮古島與伊良部島，橋面最高點約為海面上27公尺，兩側海景壯闊。"
  narration: |
    伊良部大橋於2015年1月完工通車，以三千五百四十公尺的全長成為日本最長的免費橋梁。橋面最高處距海面約27公尺，行駛或步行其上，宮古海峽一覽無遺。晴天時，橋兩側的海水呈現宮古島特有的藍綠色澤，橋墩腳下珊瑚礁隱約可見。以往宮古島居民必須搭渡輪才能往返伊良部島，這座橋的完工讓兩島從此相連，也大幅改變了伊良部島的旅遊生態。橋上設有觀景停車灣，可以下車駐足，靜靜感受被海洋包圍的遼闊。
  observationPrompt: "站在橋上觀景停車灣，低頭看橋墩周圍的海水——能在淺水區看到珊瑚礁的暗礁輪廓嗎？"
