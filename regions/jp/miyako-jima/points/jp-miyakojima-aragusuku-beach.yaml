  title: "新城海岸"
  summary: "新城海岸（アラスキビーチ）是宮古島東岸開發度最低的天然海灘之一，珊瑚礁保存完好，海水清澈見底，是逃離人群的靜謐浮潛勝地。"
  narration: |
    新城海岸緊鄰吉野海岸南側，卻比後者少了許多觀光客，維持著更接近原始的自然樣貌。海灘由細白珊瑚砂構成，海岸線較短，但礁盤延伸範圍廣，珊瑚覆蓋率高，魚類種類豐富。由於附近沒有大型商業設施，整個海灘顯得格外清幽，適合喜歡靜靜欣賞海洋生態的旅客。退潮時礁盤略微裸露，形成天然的潮池，可以近距離觀察各種小型海洋生物。建議自備浮潛裝備前往，並在進入海水前確認潮汐狀況，以獲得最佳體驗。
  observationPrompt: "低頭看腳下的珊瑚砂，能找到完整的小型貝殼或珊瑚碎片嗎？再望向海面，水的顏色從岸邊到外海有幾種層次的漸變？"
