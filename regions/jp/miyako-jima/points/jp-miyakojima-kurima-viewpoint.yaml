  title: "来間島龍宮城展望台"
  summary: "龍宮城展望台是来間島上一座造型獨特的三層樓觀景塔，頂層可360度鳥瞰與那霸前浜全景、来間大橋及宮古藍海色，是宮古島攝影打卡的最佳制高點。"
  narration: |
    爬上龍宮城展望台的頂層，視野瞬間開闊到讓人忘記呼吸。這座以琉球傳說中海底宮殿「龍宮城」命名的展望台，外型圓潤、色彩鮮明，本身就是一道風景。登頂後，北方展開的是日本最美海灘之一的與那霸前浜，那條綿延7公里的弧形白沙與宮古藍海水形成完美的色彩對比。往西可見来間大橋如細線般跨越海峽，往南則是来間島的甘蔗田與長間浜。天氣晴朗時，視線甚至能延伸到遠方的伊良部島。在這裡，您將真正理解為什麼攝影師與旅遊媒體總是選擇宮古島作為日本離島的代表封面。
  observationPrompt: "站在展望台頂層，試著辨認前浜海灘上人群的位置，並找出哪個方向的海水最藍——是橋梁以北還是以南？"
