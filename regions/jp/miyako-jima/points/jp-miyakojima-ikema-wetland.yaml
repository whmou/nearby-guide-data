  title: "池間湿地"
  summary: "池間濕地是列入拉姆薩公約的重要濕地，冬季候鳥雲集，是宮古島生態保育的象徵，也是賞鳥愛好者的朝聖地。"
  narration: |
    池間濕地位於宮古島北端、池間大橋旁，是沖縄縣重要的候鳥棲息地，也是日本少數列入拉姆薩濕地公約的場域之一。每逢冬季，來自西伯利亞與中國大陸的候鳥大批南下，在此度冬，包括斑尾鷸、彩鷸與多種鷺科鳥類，為濕地增添豐富的生命力。濕地周圍設有觀察步道，旅客可以在不干擾野生動物的前提下，靜靜觀賞鳥群在水面上起落。夏季水鳥種類雖較少，但周遭的蘆葦與紅樹林仍充滿生機。造訪此地需要一點耐心與安靜，但換來的是一種在熱帶島嶼上難以尋得的、與自然共處的靜謐時刻。
  observationPrompt: "沿著觀察步道緩步前行，試著在水面上找到至少三種不同的水鳥——注意牠們的嘴型、腳的長短與羽毛顏色有什麼差異？"
