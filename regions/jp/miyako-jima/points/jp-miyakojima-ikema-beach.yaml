  kind: attraction
  title: "池間島ビーチ"
  summary: "池間島北岸的沙灘水淺浪靜，是宮古島周邊離島中最適合浮潛的海灘之一，珊瑚礁緊鄰海岸，熱帶魚種豐富，海草床亦是觀察儒艮覓食痕跡的最佳位置。"
  narration: |
    池間島的海灘相較於宮古本島的熱門海灘，少了幾分商業氣息，多了幾分原始安靜。北岸的沙灘水淺透明，腳踩下去能清楚感受到沙質細密，而水面以下，各色熱帶魚在珊瑚礁碎石間悠遊，偶爾一群青黃色的隆頭魚一起游過，連非潛水者都能透過面鏡清晰看見。這片海域是宮古群島中儒艮最後的棲息地之一，牠們以此海域的海草為食，退潮時在淺灘留下的啃食痕跡偶爾可見。在海灘旁的礁盤行走時，偶爾可以看到海星、海膽靜靜附著在石縫之間，提醒你這片海的生命力。遠處，池間大橋的輪廓倒映在平靜的水面上，構成一幅離島特有的靜謐畫面。
  observationPrompt: "在淺水區的海草床旁仔細觀察——你能在沙底找到橢圓形的「啃食痕跡」嗎？那可能是儒艮留下的覓食印記。"
