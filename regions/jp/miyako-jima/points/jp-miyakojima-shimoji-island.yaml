  title: "下地島"
  summary: "下地島是緊鄰伊良部島南側的小島，以全長3,000公尺的訓練用跑道聞名，長年是日本航空公司飛行員技術測驗的聖地，近年更開闢國際定期航班，島嶼四周珊瑚礁環繞。"
  narration: |
    下地島與伊良部島之間僅相隔一條窄渠，兩島實際上已幾乎融為一體，但行政上仍屬獨立小島。島上最核心的存在，是那條長達三千公尺的下地島空港跑道——這條跑道自1979年啟用，數十年來一直是全日空與日本航空訓練飛行員的專屬場地，以「技術最難的降落訓練場」名聞日本航空界。如今，LCC與包機航班陸續開通，讓旅人得以直飛這座曾幾乎與外界隔絕的小島。除了航空文化，下地島周邊海域保有宮古群島中保存最完整的珊瑚礁群之一，通り池與洞窟潛水更讓它成為全球頂尖潛水客心目中的朝聖地。從伊良部島橫渡窄渠，便能親眼感受這座兼具航空傳奇與大自然奇景的小島。
  observationPrompt: "站在島上高處或橋旁，你能數出視野中停放或滑行的飛機嗎？注意看跑道盡頭與海面相接的位置。"
