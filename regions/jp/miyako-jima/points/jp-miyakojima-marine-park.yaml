  kind: venue
  title: "宮古島海中公園"
  summary: "日本少數設有水下觀察室的海洋公園，步道延伸至海中觀察室可在水面下直接觀察珊瑚礁與熱帶魚，無需潛水即能體驗海底世界。"
  narration: |
    宮古島海中公園的最大特色是一條延伸入海中的棧橋，盡頭連接一個建在珊瑚礁上的水下觀察室。沿著螺旋梯走到水面以下約一公尺處，透過強化玻璃窗，珊瑚礁群就在眼前展開，各種熱帶魚穿梭其中。這種觀看方式無需任何潛水技能或裝備，讓老人和孩子也能清楚看見平時只有潛水員才能接近的珊瑚生態。水上部分還有玻璃底觀光船可預約，從水面上直視水底，效果同樣震撼。天氣晴朗時水下能見度極高，午前光線最好。
  observationPrompt: "在水下觀察窗前，找找有沒有藍色的雀鯛（シリキルリスズメダイ）聚集在珊瑚枝叉間——牠們的身體有多小？"
