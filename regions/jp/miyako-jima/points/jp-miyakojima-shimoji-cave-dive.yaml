  title: "下地島洞窟ダイビング入口"
  summary: "下地島西岸的洞窟潛水入水點，是通往通り池地下洞穴系統的海面開口，潛水員從這個蔚藍海洞入水後，可穿越水下岩洞連通至兩個內陸水池，是宮古島最刺激的地形潛水體驗起點。"
  narration: |
    在下地島西岸崎嶇的石灰岩礁盤上，有一個對外觀看似不起眼的海面開口，但對全球洞穴潛水愛好者而言，這裡是絕對不能錯過的神聖入水點。潛水員從這個藍色海洞下潛，進入幽暗的石灰岩洞穴系統，洞壁上珊瑚化石清晰可見，偶有各式珊瑚礁魚穿梭其中。隨著洞穴向內延伸，前方出現兩個光亮的圓形光圈從深藍中升起——那正是通り池兩個水面投射下來的天光。穿越這段地下連通洞穴，從池底仰望浮上水面的瞬間，是宮古潛水體驗中最令人難忘的高潮。此行程須與持有洞穴潛水執照的在地潛水店合作進行，初學者也可參加體驗潛水方案，在教練引導下體驗洞口附近的海底地形。
  observationPrompt: "在洞口附近的礁盤上，觀察石灰岩表面的化石珊瑚紋路——你能辨認出哪些化石是古代珊瑚礁留下的痕跡嗎？"
