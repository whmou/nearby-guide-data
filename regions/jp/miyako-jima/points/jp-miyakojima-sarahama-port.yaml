  title: "佐良浜漁港"
  summary: "佐良浜漁港是宮古島伊良部島上歷史悠久的鰹魚漁業重鎮，保留著傳統漁村聚落風貌，是感受琉球離島生活文化的真實場景。"
  narration: |
    佐良浜漁港坐落於伊良部島西岸，是宮古島漁業文化最具代表性的聚落之一。這裡的漁民世代以捕捉鰹魚（カツオ）維生，採用一本釣（one-by-one）的傳統釣法，在漁業界享有盛名。港口邊常見漁船進出，漁獲直接在此卸貨處理，早晨時分充滿新鮮魚貨的氣息與漁夫的吆喝聲。聚落中的街道依山而建，色彩繽紛的屋舍沿坡道層疊排列，保留著獨特的沖縄離島街景。過去佐良浜與宮古本島之間需要搭船往返，隨著伊良部大橋通車，這個封閉的漁村逐漸對外開放，但濃厚的傳統氛圍依然保存完好，適合喜歡深度文化旅遊的旅客探訪。
  observationPrompt: "在漁港邊觀察停泊的漁船，找找看船身上有沒有標示漁船名稱的日文字——留意港口周圍有沒有正在曬魚乾或修整漁網的工作場景。"
