  title: "保良泉鍾乳洞"
  summary: "保良泉鍾乳洞是宮古島東南部保良地區的石灰岩洞穴，洞內有精緻的石筍與鐘乳石地質景觀，附設浮潛設施，是宮古島少數可深入地底探索的自然體驗。"
  narration: |
    宮古島的地底世界同樣精彩。保良泉鍾乳洞位於島東南部的保良地區，這一帶的地下水資源豐富，形成了獨特的石灰岩洞穴系統。進入洞穴後，溫度比外界涼爽許多，洞壁上千萬年積累的石筍與鐘乳石在燈光照耀下呈現奶白色與琥珀色的光澤，流水侵蝕留下的紋路宛如天然雕塑。保良泉名稱中的「泉」指的是附近的天然湧泉，純淨的地下水從石灰岩縫隙中滲出，形成獨特的清水潭。園區同時提供洞外的珊瑚礁浮潛體驗，讓旅客在一處地點同時感受地底奇觀與水下世界。參觀需跟隨導覽，請穿著適合步行的防滑鞋。
  observationPrompt: "在洞內找一根垂掛的鐘乳石，仔細觀察它的末端——是否有水珠正在滴落？試著估算這根鐘乳石的直徑，並想想它需要多少年才能長到現在的大小。"
