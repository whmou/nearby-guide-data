  title: "下地島空港"
  summary: "下地島空港擁有全長3,000公尺的跑道，自1979年起長期作為全日空與日本航空飛行員技術審查的訓練機場，近年轉型為國際定期航班起降點，旅客大廳設計融入宮古島海洋元素，是探訪下地島的主要門戶。"
  narration: |
    下地島空港的歷史與日本民航業的養成息息相關。這條三千公尺長的跑道自1979年啟用後，數十年來專門供全日空與日本航空的飛行員在此進行模擬緊急降落、側風降落等高難度技術審查，是日本民間航空培訓體系中不可或缺的一環。由於不對外開放商業旅客，島上長期保持低度開發，反而讓周圍的珊瑚礁與自然環境得以完好保存。2019年，Solaseed Air等低成本航空開始引進定期航班，隨後更有來自台灣、東南亞的包機，讓旅人終於能直接飛抵這座傳說中的訓練聖地。現在的航廈以白色與藍色為主調，候機大廳的大片落地窗讓旅客在等候時便能望見外頭一望無際的宮古藍海。
  observationPrompt: "在航廈候機大廳或戶外觀景區，注意看停機坪上的飛機機型——與一般大型機場相比，你覺得這裡的飛機有什麼不同之處？"
