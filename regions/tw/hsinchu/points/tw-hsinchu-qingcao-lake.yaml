  title: "青草湖"
  summary: "青草湖是新竹市東郊山麓間的一座風光明媚水庫湖泊，湖岸設有步道與涼亭，遊客可租借腳踏船體驗湖上悠閒時光。"
  narration: |
    青草湖靜靜地躺在新竹市東側的淺山丘陵之中，四周林木蓊鬱，湖面水色在不同天候下變換著深淺不一的青綠與銀灰。這座水庫最早建於日治時期，原本作為農業灌溉之用，如今已成為新竹市民假日出遊的經典去處。湖邊規劃了一條平緩的環湖步道，沿途設有木造涼亭供遊客休憩，不時可見白鷺鷥在淺水處覓食。湖面上有人力腳踏船和划船出租，乘船緩行湖心，遠山倒影清晰可見，別有一番寧靜意境。湖畔附近的「靈隱寺」是香火鼎盛的佛教寺廟，每逢假日香客絡繹不絕，為這片山水風光增添了濃厚的人文氣息。傍晚時分，落日餘暉映照水面，是難得一見的城郊山水美景。
  observationPrompt: "站在湖岸邊，你能在湖面找到白鷺鷥的倒影，或看見牠們低飛掠過水面嗎？"
