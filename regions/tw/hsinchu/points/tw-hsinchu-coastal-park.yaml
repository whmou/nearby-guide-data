  title: "南寮海岸遊憩區"
  summary: "南寮海岸遊憩區擁有寬闊的沙灘與連綿沙丘，強勁的新竹風帶來絕佳的風箏衝浪與風浪板條件，是台灣最知名的風浪板運動海岸之一。"
  narration: |
    南寮海岸遊憩區緊鄰南寮漁港北側，是一片向台灣海峽敞開的寬闊沙灘地帶。這裡最引人注目的不只是海景，更是那幾乎全年不停歇的海風——新竹的風是全台灣最強勁的，也因此讓這片海岸成為台灣風浪板運動的重鎮。每到假日，彩色的風箏衝浪帆和風浪板在海面上疾馳，高手們駕馭著風力騰空飛躍，壯觀的景象讓岸上的旁觀者也忍不住喝采。沙灘後方是一列高低起伏的天然沙丘，植生茂密，成為阻擋風沙的天然屏障，也是孩子們最愛奔跑玩耍的地方。園區內設有停車場、廁所與簡易設施，旁邊有單車租借服務，遊客可以沿著海岸自行車道一路騎往漁港，串連成完整的海岸休閒路線。
  observationPrompt: "數數看海面上有幾面不同顏色的風箏衝浪帆正在飛翔？你能觀察到衝浪者如何借助風力在浪頭上起跳嗎？"
