  title: "新竹米粉文化"
  summary: "新竹是台灣米粉之都，獨特的九降風將細如髮絲的純米粉自然風乾，造就了全台無可複製的Q彈口感與清香滋味。"
  narration: |
    每逢秋冬，新竹縣市交界的香山一帶吹起強勁的九降風，這股由東北季風翻越山嶺而成的強勁乾燥氣流，正是新竹米粉得天獨厚的天然乾燥機。工廠師傅將純米漿擠壓成如髮絲般細的米粉條，掛在竹竿架上任九降風反覆吹拂，短則一日、長則數日，米粉在風中逐漸收水硬化，形成緊實而不易斷裂的質地。傳統米粉工廠多集中在新竹市南區，廠區飄散著淡淡的米香。進入工廠參觀時，可以看見白色米粉條迎風飛舞如白色簾幕，景象壯觀。烹調時，新竹米粉吸附湯汁的能力出眾，無論是乾炒或湯煮，皆能保持彈牙不糊爛的口感。
  observationPrompt: "請觀察風乾中的米粉條，注意它的粗細是否均勻——傳統手工擠壓與機器製作的米粉在外觀上有什麼差異？"
