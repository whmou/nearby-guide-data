  title: "新竹都城隍廟"
  summary: "建於1748年的清代廟宇，供奉官封「晉封台灣府城隍爺威靈公」，是全台地位最高的城隍廟之一，廟口小吃聞名全島。"
  narration: |
    新竹都城隍廟建於清乾隆十三年（1748年），歷經多次重修，三川殿上高懸的大算盤是廟中最廣為人知的象徵——算盤告誡世人，善惡因果分毫不差，無一遺漏。廟內斗拱、彩繪、交趾陶和剪黏裝飾工藝精湛，抬頭細看，每個角落都有民間師傅留下的故事。每年農曆七月的城隍爺出巡繞境是台灣規模最大的宗教慶典之一，萬人空巷。廟前廣場延伸出去的廟口商圈，米粉、貢丸、潤餅是在地人早餐與宵夜的共同記憶。
  observationPrompt: "抬頭找找三川殿梁上懸掛的大算盤——算盤上每顆珠子代表什麼意思？"
