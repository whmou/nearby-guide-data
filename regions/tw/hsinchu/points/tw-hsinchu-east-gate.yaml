  title: "東門城（迎曦門）"
  summary: "建於1827年的清代城門，是新竹古城牆唯一留存至今的遺跡，也是這座城市最具代表性的地標。"
  narration: |
    這座圓拱形城門建於清道光七年（1827年），原名「迎曦門」，取迎接東方晨曦之意，是昔日新竹府城四座城門之一，也是唯一保存完好傳承至今的一座。城門以紅磚與花崗石建成，拱洞上方的石刻紋飾歷經近兩百年風霜，輪廓依然可辨。城樓頂層為木構歇山式屋頂，飛簷翹脊顯現清代官式建築的莊嚴氣度。夜晚打燈後，磚紅與橙黃交疊，是城市中最上鏡的角落之一。
  observationPrompt: "仔細看拱門兩側的石材，能找到不同時期修繕留下的新舊磚石拼接痕跡嗎？"
