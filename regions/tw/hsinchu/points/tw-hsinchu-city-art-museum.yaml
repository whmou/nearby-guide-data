  title: "新竹市美術館"
  summary: "座落於1936年日治時期菸酒公賣局舊廳舍的市立美術館，以歷史建築空間承載當代藝術展覽，是新竹文化地景的重要一環。"
  narration: |
    這棟米白色洗石子建築原為昭和十一年（1936年）建造的台灣總督府專賣局新竹支局，當年是管理菸草與酒類專賣事務的官署，戰後幾經轉型，2001年修復後開館成為新竹市美術館。建築外觀採用當時流行的現代主義簡化古典風格，水平腰線與垂直壁柱交織，入口門廊保留原始弧形雨庇，細部比例沉穩而典雅。走入館內，挑高的展覽廳延續了官署建築寬闊肅穆的空間感，成為當代藝術作品的絕佳背景。美術館定期更換展覽，涵蓋本地藝術家個展、台灣當代藝術群展及國際交流展，館外小廣場也不時設有裝置藝術，讓來訪者在感受老建築歷史厚度的同時，也能接觸最新的藝術創作能量。
  observationPrompt: "請觀察建築正立面，找找看入口門廊的弧形雨庇與兩側壁柱之間，有沒有隱藏在簷角的裝飾細節？"
