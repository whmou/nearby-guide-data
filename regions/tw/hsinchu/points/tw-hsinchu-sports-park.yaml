  title: "新竹市立體育場"
  summary: "新竹市立體育場是市中心最大的綜合運動公園，環形跑道旁綠草如茵，週末假日市集與運動人潮交織，展現新竹市民活躍的城市生活文化。"
  narration: |
    新竹市立體育場矗立在市區核心地帶，是新竹市規模最大的公共運動與休閒空間。這座體育場建設於數十年前，歷經多次整修後，如今擁有標準的田徑跑道、足球場、網球場及多功能球場，幾乎任何時段都能看見市民在此揮汗運動。體育場外圍是一片寬闊的草坪綠地，每逢週末，這裡搖身一變成為人氣旺盛的市集場地，小農蔬果、手工藝品、創意小食攤位一字排開，吸引大批家庭攜老扶幼前來採購與閒逛。這種運動場地與週末市集並存的模式，生動呈現了新竹作為一座科技城市之外，居民日常生活中那種重視健康與社區情感的面向。每逢大型運動賽事或音樂活動，體育場更成為全市的歡聚中心，觀眾的加油聲與歡笑聲響徹整個街區。
  observationPrompt: "在體育場外的草坪上，你能觀察到幾種不同的運動項目正同時在進行？週末的市集攤位賣些什麼最有特色？"
