  title: "新竹關帝廟"
  summary: "新竹關帝廟主祀關聖帝君，是竹塹商業社群祈福許願的精神重心，每逢農曆節慶香火鼎盛、傳統儀式熱鬧非凡。"
  narration: |
    新竹關帝廟坐落於舊城區核心，主祀義薄雲天的關聖帝君，數百年來一直是竹塹地區商人與工匠膜拜的守護神殿。廟宇正殿樑柱上雕龍畫鳳，屋脊燕尾高翹，以鮮豔的剪黏裝飾呈現三國故事中的英雄場景。每逢農曆正月十三關帝誕辰，廟前廣場鑼鼓喧天，陣頭遊行穿街過巷，信眾扶老攜幼前來上香祈求生意興旺。廟側的壁堵石雕細膩，記錄了昔日竹塹城的商業繁景，值得駐足細賞。
  observationPrompt: "請仔細觀察廟宇正殿屋脊上的剪黏裝飾，看看你能辨認出哪些三國故事中的人物或場景？"
