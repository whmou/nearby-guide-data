  title: "南寮漁港"
  summary: "南寮漁港是新竹市最主要的漁業基地，清晨漁船魚貨上岸熱鬧非凡，港邊聚集多家海鮮餐廳，以平價新鮮的漁港料理聞名。"
  narration: |
    南寮漁港坐落在新竹市北側海岸，是台灣西海岸中部規模較大的漁業港口之一。每天清晨四、五點，漁船陸續返航靠港，漁民們忙著將一箱箱活跳跳的漁獲搬運上岸，拍賣場內叫價聲此起彼落，整個港區充滿著大海與漁業的生猛活力。到了上午，港邊的海鮮餐廳和小吃攤紛紛開張，供應當天現捕的各式海鮮：活魚、蛤蜊、花枝、螃蟹，價格實惠且新鮮度無可挑剔。港區外側設有觀景台和步道，可以近距離欣賞漁船靠泊的日常風景，也能眺望外海的防波堤與燈塔。傍晚時分，落日緩緩沉入台灣海峽，將整個港區染成一片橙紅，是攝影愛好者不容錯過的迷人光景。
  observationPrompt: "在港邊仔細觀察，你能找到掛著晾曬魚乾的漁網架，或看見漁民正在修補漁網嗎？"
