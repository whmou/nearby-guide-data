  kind: attraction
  title: "香山濕地"
  summary: "香山濕地是台灣西海岸重要的潮間帶生態系，豐富的泥灘地孕育大量彈塗魚、招潮蟹與候鳥，木棧道讓遊客得以深入濕地核心觀察野生生態。"
  narration: |
    香山濕地沿著新竹市西南側海岸線延伸，是台灣西部沿海面積最大、保存最完整的泥質潮間帶濕地之一，在國際上被列為重要野鳥棲地。退潮時，一望無際的灰褐色泥灘攤露在海風之下，仔細觀察，你會發現泥面上盡是生命的痕跡：用一隻螯爪舞動求偶的招潮蟹在泥地上疾行，能用胸鰭「行走」的彈塗魚在水坑間跳躍，偶爾一隻蒼鷺靜靜立在淺水中等待獵物。每年冬春之際，數萬隻候鳥在此停棲補充體力，其中包括瀕危的黑面琵鷺和各種鷸科候鳥，讓這片泥灘成為賞鳥人的朝聖之地。政府沿著泥灘建設了一條全長約兩公里的木棧道，讓遊客可以安全地深入濕地邊緣，在不打擾生態的前提下近距離欣賞這片生機盎然的海岸自然教室。
  observationPrompt: "在木棧道旁的泥灘上，你能看見招潮蟹揮舞著不對稱大螯的身影嗎？退潮時泥面上留著哪些動物行走的痕跡？"
