  title: "鄭家古厝"
  summary: "鄭家古厝是新竹市保存完好的清代閩南式大宅，燕尾屋脊與精緻磚雕展現了竹塹望族的建築美學與工藝巔峰。"
  narration: |
    鄭家古厝建於清朝中晚期，是竹塹地區望族以閩南建築工法打造的三合院大宅。走到建築正面，最引人注目的是兩端高翹如燕尾的屋脊，這種曲線優雅的「燕尾式」屋頂是閩南傳統建築中等級與財力的象徵。正身山牆上的剪黏浮雕以彩色瓷片拼貼而成，花鳥蟲魚栩栩如生；廊道斗拱的木構雕刻則以卯榫接合，無一根釘子。走入門廳，磚造牆面以「斗子砌」手法交錯排列，既美觀又有隔熱功效，是昔日匠師智慧的體現。古厝外牆免費開放觀賞，靜靜佇立其前，可感受時間在磚瓦間的留駐。
  observationPrompt: "請仔細觀察屋脊兩端燕尾的弧度與翹起角度，再比較兩側護龍的屋脊造型——你能找出它們之間的差異嗎？"
