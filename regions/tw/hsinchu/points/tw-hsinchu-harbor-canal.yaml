  title: "港南運河"
  summary: "港南運河是連接新竹漁港與市區的歷史水道，兩岸設有平坦的自行車道，木造漁船靜靜停泊其間，構成一幅悠閒的水岸風情畫。"
  narration: |
    港南運河沿著新竹市西側延伸，是昔日往來漁港與市區之間的重要水路通道。運河開鑿於日治時期，見證了新竹漁業最繁盛的年代，漁船滿載漁獲穿梭其間，一派生機勃勃的景象。如今運河雖然不再扮演主要交通功能，卻以另一種面貌延續著它的生命力。兩岸整建完成的自行車道平坦寬闊，是新竹市民假日騎車的熱門路線，沿途可以近距離欣賞靜靜繫泊在運河中的木造老漁船，這些斑駁的船身和船名是最真實的漁村歷史記憶。傍晚時分，橋上常有釣客垂釣，周邊也有幾間老式小吃店飄出香氣，讓整條運河保有濃厚的在地生活氣息，是一條可以讓旅人慢下腳步感受新竹海港文化底蘊的水岸廊道。
  observationPrompt: "沿著運河岸邊走，你能在泊靠的老漁船船身上找到有趣的船名或吉祥圖案嗎？"
