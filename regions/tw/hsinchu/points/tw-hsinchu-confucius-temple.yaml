  title: "新竹孔廟"
  summary: "建於清代的孔廟，現存建築為1874年重修後的格局，是新竹地區最重要的文教精神地標，每年教師節舉行傳統祭孔典禮。"
  narration: |
    新竹孔廟最早建於清康熙年間，歷經多次遷建與重修，現存格局定於同治十三年（1874年）的重修。廟制遵循傳統儒家禮制，大成殿高踞月台之上，石雕龍柱與紅牆黃瓦透露出莊重的文廟氣息。欞星門前的泮池在晴天倒映著殿頂，水面平靜，讓整個廟院多了幾分書院氣質。每年九月廿八日教師節，清晨的祭孔大典依古禮進行，金聲玉振的雅樂與舞生的六佾之舞是難得一見的無形文化遺產。
  observationPrompt: "在大成殿前找找泮池邊的石雕——能辨識出欞星門上雕刻的圖案主題嗎？"
