  title: "新竹竹文化工藝"
  summary: "新竹「竹」字得名於遍布早期平原的竹林，數百年竹材加工傳統孕育出從農具到藝術品的完整竹工藝體系。"
  narration: |
    新竹的「竹」不僅是地名，更是這座城市的靈魂。昔日竹塹平原遍植孟宗竹與桂竹，居民就地取材，發展出精湛的竹編、竹雕與竹炭燒製工藝。從曬穀用的竹籮、農家日用的竹籃，到現代工藝師創作的竹燈、竹傢俱，竹材的可能性被一再突破。市區內仍有數間老字號竹器行與工作室，師傅以雙手示範劈竹、削篾、壓紋等傳統工序，整個過程散發著清新的竹香。走訪工坊時，不妨留意師傅如何依竹節分布選取最適合的竹段，這是幾十年功力的體現。
  observationPrompt: "請觀察師傅手邊的竹材，注意竹節的間距與竹壁的厚薄——師傅是如何依照不同用途挑選竹段的？"
