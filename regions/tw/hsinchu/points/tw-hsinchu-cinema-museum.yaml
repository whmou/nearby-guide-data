  title: "新竹市影像博物館"
  summary: "建於1933年的裝飾藝術風格戲院建築，曾是全台第一座有冷氣的戲院，現為保存台灣電影文化記憶的影像博物館。"
  narration: |
    這棟奶油色的流線型建築在中正路上顯得格外搶眼，圓弧轉角、橫向帶窗與幾何浮雕裝飾，是1930年代風靡全球的裝飾藝術（Art Deco）風格的典型表現。它建於昭和八年（1933年），最初以「有樂館」之名開業，戰後改稱「國民大戲院」，最引以為傲的，是曾在台灣率先安裝冷氣設備，是彼時新竹居民趨之若鶩的消暑勝地。戲院停業後，新竹市政府將其修復保存，2001年以「影像博物館」名義重新開幕，館內設有放映廳、常設展廳與文獻典藏室。常設展以黑白老照片、放映器材與戲院歷史回顧為核心，重現了台灣電影走入民間的黃金歲月；定期也有老電影放映場次，讓觀眾坐回這棟有著八十年歷史的院廳，感受膠卷時代的光與影。
  observationPrompt: "站在建築轉角，仔細觀察外牆上裝飾藝術風格的幾何浮雕帶，能辨識出幾種不同的圖案元素？"
