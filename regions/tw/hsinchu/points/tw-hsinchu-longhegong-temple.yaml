  title: "長和宮"
  summary: "建於清代乾隆年間的古廟，位於舊城南門一帶，是新竹市現存歷史最悠久的廟宇之一，主祀媽祖。"
  narration: |
    長和宮靜靜矗立在古城南門附近的老街巷弄間，這裡是昔日新竹港口商賈往來的要道，也是早期漳泉移民為庇佑海上往來而建廟祈願之地。廟宇創建於清乾隆年間，歷經多次重修，現存廟身融合了不同時代的修建痕跡，屋脊剪黏龍鳳精細繁複，廟前石獅與石鼓保存了部分早期雕刻風格。正殿供奉媽祖，兩側配祀千里眼與順風耳神將，神龕金光燦爛，香煙嫋繞。走進廟埕，腳下的鵝卵石地面與磨石子拼花留存著歲月的溫度，廟旁老榕樹盤根錯節，為這座古廟增添了幾分蒼老的氣息。對比附近已逐漸現代化的街道，長和宮像是時光的錨點，提醒著來訪者這一帶曾是人潮熙攘的渡頭聚落。
  observationPrompt: "仔細看廟宇屋脊上的剪黏裝飾，能找到龍、鳳以外的哪些神話動物或人物故事場景？"
