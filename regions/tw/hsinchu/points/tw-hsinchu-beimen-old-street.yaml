  parentId: null
  kind: attraction
  title: "北門街老街"
  summary: "北門街是新竹市逾兩百年歷史的老商業街，香鋪、中藥行、紙燈籠坊錯落其間，保留了竹塹城最鮮活的傳統商業記憶。"
  narration: |
    北門街的歷史可追溯至清乾隆年間，當年竹塹城北門外商賈雲集，逐漸形成這條蜿蜒的商業街道。時至今日，街上仍保存著數十間百年老鋪：製作金紙、香燭的香鋪飄散著淡淡檀香，老中藥行的木製藥櫃陳列著數百種藥材，彩繪宮燈坊裡師傅正用毛筆在紅紙燈罩上繪製龍鳳圖騰。街道兩旁的騎樓下，老師傅們依循古法製作的各式祭祀物品，色彩繽紛、工藝細膩。漫步其間，閉上眼睛，混合著香燭、草藥與紙漿的氣息，彷彿穿越回兩百年前的竹塹城市集。
  observationPrompt: "請找一間香鋪，仔細觀察店內陳列的香品種類與規格——你能猜出哪些香是用於哪類廟會或節慶場合的嗎？"
