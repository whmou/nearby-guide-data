  kind: attraction
  title: "新竹市立博物館"
  summary: "新竹市立博物館以豐富的常設展呈現從道卡斯族原住民到清領、日治乃至當代的城市發展脈絡。展覽涵蓋文物、影像與互動裝置，是認識新竹歷史的最佳入口。"
  narration: |
    新竹市立博物館坐落於市區核心，建築外觀融合現代設計與地方元素，一走進館內便能感受到時間的層疊感。常設展從距今數千年前便在此生活的道卡斯族說起，透過出土陶器與族人服飾，讓人想像竹塹平原曾有的聚落樣貌。進入清代展廳，鄭用錫開台進士的故事與竹塹城的城牆模型令人印象深刻；日治時代的老照片則記錄了新竹從傳統城市蛻變為現代化街道的過程。二樓的常設展延伸至戰後發展與科技重鎮崛起，完整串聯新竹從農業社會到半導體之都的百年軌跡。館內還設有兒童探索區，適合闔家參觀。建議安排一個半小時以上細細品味。
  observationPrompt: "請找找入口大廳展示的竹塹城老地圖，試著對照今日的街道格局，看看哪條現代道路是清代城牆的舊址。"
