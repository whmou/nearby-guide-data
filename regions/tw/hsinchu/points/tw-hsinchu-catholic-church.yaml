  title: "新竹天主堂（聖若瑟主教座堂）"
  summary: "建於1950年代的哥德式風格主教座堂，是台灣西部天主教社群的重要信仰中心，高聳的雙塔鐘樓是新竹市天際線的獨特座標。"
  narration: |
    走近新竹天主堂，兩座對稱的石灰色鐘樓在藍天下顯得格外莊嚴。這座聖若瑟主教座堂建於1950年代，以哥德復興風格為藍本，尖拱窗、玫瑰花窗與飛扶壁等元素呼應了歐洲中世紀大教堂的氣勢，卻在比例上因地制宜，融入了台灣的在地材料與工藝，形成一種帶有亞熱帶質感的哥德式詮釋。推開沉重的木門走入中殿，肋骨拱頂在頭頂展開，彩色玻璃花窗將日光濾成琥珀、寶藍與深紅，灑落在石板地面上。教堂側廊設有若干精緻的聖像龕，宗教藝術品與建築本身相輔相成。作為新竹教區主教座堂，這裡不僅是彌撒舉行之所，也是每年重要天主教節日的慶典中心，歡迎訪客在彌撒時段以外入內靜觀感受。
  observationPrompt: "抬頭觀察中殿的彩色玻璃花窗，辨識看看各窗描繪的是哪位聖人或聖經場景，並注意光線在不同時段的色彩變化。"
