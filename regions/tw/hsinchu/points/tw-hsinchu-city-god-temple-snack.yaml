  title: "城隍廟口小吃街"
  summary: "城隍廟前的小吃街是新竹美食的最高殿堂，肉圓、摔麵、貢丸湯與麻糬在此匯聚，是造訪新竹不可錯過的味覺朝聖地。"
  narration: |
    踏進新竹城隍廟前的廟口廣場，撲鼻而來的是混合著滷肉、炸物與甜糯米香的複雜氣息。這裡是新竹小吃文化的心臟地帶，從清晨到深夜，攤販與老字號餐廳緊密排列在廟宇兩側的騎樓下，每一家都有數十年甚至百年的歷史。新竹貢丸以手打肉漿製成，咬開時湯汁迸發；蚵仔麵線的麵線軟而不爛，大腸Q彈入味；手工麻糬外皮柔軟，內餡花生香氣濃郁。最有趣的是廟口的摔麵攤，師傅將麵團反覆甩打拉扯至細如絲線，表演性十足。每逢假日午後，廟前廣場人聲鼎沸，食客、信徒與遊客交織，展現了台灣廟口文化最真實的熱鬧面貌。
  observationPrompt: "請找一攤貢丸湯，觀察老闆用湯匙舀貢丸的動作——傳統手打貢丸的表面紋路與形狀，和超市販售的有什麼不同？"
