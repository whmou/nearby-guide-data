  title: "新竹州廳"
  summary: "1925年完工的日治時期巴洛克式行政建築，現為新竹市政府所在地，外立面的拱廊與綠色圓頂是台灣保存最完整的日殖民地官廳建築之一。"
  narration: |
    新竹州廳建於大正十四年（1925年），由日本建築師設計，以紅磚搭配白色飾帶構成的巴洛克折衷主義立面，是台灣日治時代官廳建築的代表作之一。正面中央的半圓形綠色銅頂，搭配兩側對稱的圓弧拱廊，呈現出嚴謹的軸線美感。一百年來，這棟建築見證了台灣從日治走向戰後的歷史更迭，如今仍是運作中的市政府，歷史的重量與日常行政並存其中。站在正門廣場望去，那排廊柱與古典山牆在現代街景中顯得格外沉穩。
  observationPrompt: "觀察正面屋頂的圓弧銅頂——它的顏色為何是獨特的藍綠色？這種顏色是如何形成的？"
