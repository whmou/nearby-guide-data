  title: "中正公園"
  summary: "中正公園是新竹市最大的都市公園，依山而建，園內一尊高達18公尺的觀音立像俯瞰全城，是新竹天際線最醒目的地標。公園晨昏人氣旺盛，花木扶疏，設施完善，是市民運動休閒的日常聖地。"
  narration: |
    中正公園依丘陵地形而建，層層石階引人往高處攀登，愈走愈能將新竹市區的風貌盡收眼底。公園制高點矗立著一座高達18公尺的白色觀音立像，手持淨瓶、慈眉善目，天氣晴朗時在市區許多街角抬起頭便能望見她的身影，早已成為新竹獨有的城市座標。
    公園空間豐富多元：入口廣場有噴水池與花圃，適合帶著孩子散步；中段設有運動器材與慢跑步道，清晨六七點充滿晨運的市民；高處平台臨風，九降風吹拂之下，眺望城市的感受尤為爽颯。秋冬九降風最盛的季節，站在制高點感受呼嘯而過的強勁海風，正是體驗新竹風城性格的最佳方式之一。
    公園旁鄰近動物園（即新竹市立動物園）與城隍廟商圈，可以串連成半日輕鬆行程。傍晚時分，夕陽將觀音像染成暖橘色，是拍攝新竹天際線的最佳時刻。
  observationPrompt: "站在觀音像基座的瞭望平台，向西北方俯視，試著找出護城河的綠帶輪廓——那一道綠色曲線，正是當年清代城牆的舊址。"
