  title: "新竹市立玻璃工藝博物館"
  summary: "全台唯一以玻璃工藝為主題的博物館，館舍本身為1936年落成的日治時期官舍建築，收藏台灣及國際玻璃藝術精品。"
  narration: |
    新竹的玻璃產業有超過百年歷史，最盛時期全球聖誕燈泡有八成以上出自這裡。這座博物館選址在新竹公園旁一棟1936年的日治官舍，木構桁架與和式外廊保存完好，成為玻璃藝術作品最溫潤的容器。常設展廳展示從坩堝吹製到精密光學玻璃的各種工藝，陽光穿透展品時折射出的色彩讓整個空間流動起來。館外廣場有幾件大型玻璃公共藝術，在陰天也依然亮眼。
  observationPrompt: "在常設展廳找一件吹製玻璃器——仔細看它的壁面，能看出師傅吹製時旋轉留下的螺旋紋嗎？"
