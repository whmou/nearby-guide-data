  title: "新竹火車站"
  summary: "建於1913年的日治時期巴洛克式車站，是台灣現存最美麗的古典主義火車站建築之一，至今仍持續運營。"
  narration: |
    站在新竹火車站正面廣場，目光自然被這棟磚紅色巴洛克式建築所吸引。這座車站建於明治四十六年（1913年），由日本建築師松崎萬長設計，以紅磚搭配白色仿石砌飾帶構成外牆，中央圓頂鐘樓高聳，兩翼對稱展開，整體立面端莊而繁複，融入了文藝復興與巴洛克式拱廊的古典語彙。站體正面共有三座拱廊入口，拱券上方的裝飾浮雕細緻入微，歷經百年依然清晰。走入大廳，木製候車椅與拱形天花板保留了部分原始風貌，讓人在通勤往來之間仍能感受到那個建設年代的細膩工藝。新竹車站是台灣少數既保存完整歷史外觀、又持續作為交通樞紐的鐵道建築，每天數萬名旅客穿梭其間，為這棟百年建築注入了最真實的生活氣息。
  observationPrompt: "站在正面廣場，數數看中央鐘樓拱廊兩側各有幾根倚柱，並找找看拱券浮雕中出現了哪些植物或幾何圖案？"
