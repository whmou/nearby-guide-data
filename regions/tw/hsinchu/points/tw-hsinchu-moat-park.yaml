  id: tw-hsinchu-moat-park
  parentId: null
  kind: attraction
  title: "護城河親水公園"
  summary: "環繞新竹舊城區的護城河改建而成的帶狀公園，全長約1.8公里，是市民散步、騎單車的日常生活空間，也是認識新竹舊城輪廓的最佳路線。"
  narration: |
    這條護城河開鑿於清代，最初是保護新竹府城的防禦設施。隨著城牆陸續拆除，護城河失去原本的功能，卻在城市更新中被改造成一條綠色廊道。沿岸種植的榕樹與水生植物讓河道常年保持蔭涼，白鷺鷥不時駐足水邊。傍晚時分，這裡是附近居民帶孩子散步、情侶漫步的生活場景——走一圈大約四十分鐘，繞過去便能接到東門城廣場。河面偶爾倒映著老城區的屋頂輪廓，是最平靜的新竹切面。
  observationPrompt: "沿著護城河步道走，找找水面邊的白鷺鷥停棲點，或水中的睡蓮葉——今天的河面有多清澈？"
