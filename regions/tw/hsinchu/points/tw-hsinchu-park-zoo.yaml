  kind: attraction
  title: "新竹公園暨動物園"
  summary: "創立於1921年的百年公園，園內附設的新竹市立動物園是台灣現存歷史最悠久的動物園，免費入場，保有舊式動物園的懷舊氛圍。"
  narration: |
    新竹公園建於日治大正十年（1921年），是新竹市最大的城市公園。園內老榕樹蒼鬱，幾棵樹齡超過百年的大樹讓整個公園充滿蔭涼。附屬的市立動物園是台灣歷史最悠久的動物園，至今仍免費入場，長頸鹿、河馬與各種鳥類是孩子的心頭好。公園內還保有幾棟日治時期的磚造設施，以及新竹州圖書館遺跡，讓一座公園同時承載著自然與歷史的厚度。假日晴天，公園裡人聲鼎沸，卻也能找到僻靜的角落靜坐。
  observationPrompt: "在公園找找樹齡超過百年的老榕樹——看看它的氣根有沒有垂到地面，根系覆蓋了多大範圍？"
