  title: "竹蓮寺"
  summary: "創建於清乾隆七年（1742年）的觀音廟，是新竹市歷史最悠久的佛寺，也是在地居民的重要精神信仰依歸。"
  narration: |
    竹蓮寺安靜地坐落在竹蓮街的街角，與周圍的日常生活氣息融為一體。這座廟宇創建於清乾隆七年（1742年），以觀世音菩薩為主祀神，是新竹地區最早建立的佛教寺廟之一。「竹蓮」之名源自寺前昔日生長的大片竹林與蓮池，這番清幽景色雖已隨都市化而消逝，但廟名將那段記憶留存至今。現存廟體歷經多次重修，三川殿門面的石獅雕刻和交趾陶裝飾精緻細膩，正殿的觀音神像莊嚴慈悲，兩側供奉十八羅漢，氣氛肅穆而不失親和。廟埕是居民日常聚集的場所，清晨有長者在此打太極、傍晚有孩童追逐嬉戲，香火鼎盛而喧囂未至，是感受新竹常民信仰生活最直接的所在。
  observationPrompt: "在三川殿外牆找找看交趾陶裝飾，辨識幾個傳統故事場景或神話人物，留意色彩與人物姿態的細節。"
