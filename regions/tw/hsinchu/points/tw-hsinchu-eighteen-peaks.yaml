  kind: attraction
  title: "十八尖山"
  summary: "十八尖山是新竹市中心最重要的城市森林公園，由18座連綿丘陵組成，春季滿山遍野的山櫻花是全市最熱門的賞花勝地。"
  narration: |
    十八尖山橫亙在新竹市東南側，是一片難得保存完整的城市丘陵森林。整座山系由18座高低起伏的小山頭串聯而成，主峰海拔不高，卻擁有超過4公里的環形步道，讓遊客能在樹蔭遮蔽下悠閒健走。步道沿途視野開闊，可以俯瞰新竹市區、遠眺台灣海峽，天氣晴朗時甚至能看見風力發電機的身影。每年一到二月，山坡上種植的山櫻花次第盛開，粉紅花海與綠色山頭交織出令人屏息的景色，吸引大批市民及外縣市遊客前來拍照踏青。除了賞花季，這裡一年四季都是新竹人早晨健身、黃昏散步的好去處，偶爾還能遇見鬆鼠在枝頭跳躍，是一座充滿生命力的都市綠肺。
  observationPrompt: "站在稜線步道上往西望，你能數出幾座風力發電機的白色風車？"
