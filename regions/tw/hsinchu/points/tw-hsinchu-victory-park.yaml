  title: "勝利公園"
  summary: "勝利公園是緊鄰新竹舊城區的歷史綠地，園內保存日治時期神社的石燈籠與基座遺跡，百年老榕樹氣根垂掛、樹冠遮天，是鬧市中難得的幽靜角落。"
  narration: |
    勝利公園坐落在新竹市中心東側，是一座歷史比許多人想像中更深厚的城市公園。日治時期，此地是供奉護國神明的新竹神社所在地，莊嚴的鳥居與石燈籠沿著參道排列，是當時日本官員與民眾的信仰中心。1945年後，神社主殿被改建為忠烈祠，但一些石燈籠的基座與護欄依稀可見，在草叢與樹根之間靜靜述說著歷史更迭的故事。公園最令人印象深刻的是那幾棵樹齡超過百年的老榕樹，粗壯的樹幹需要好幾個人才能合抱，氣根如瀑布般垂落地面，形成一個天然的綠色穹頂，鳥叫聲在其間迴響，隔絕了外面馬路的喧囂。這裡是附近居民早晨打太極、傍晚散步的常去之地，也是旅人可以在城市探索間歇稍作喘息的幽靜場所。
  observationPrompt: "在公園裡找找看，還有哪些石造構件可能是日治時期神社留下來的痕跡？注意看石燈籠底座的造型。"
