  title: "北門街"
  summary: "清代新竹城北門外的古商街，現存大量傳統閩南式街屋與老字號店舖，紅燈籠與古樸騎樓構成新竹最具歷史感的街道景致。"
  narration: |
    北門街從清代起便是新竹最繁盛的商業幹道之一，舊稱「北門大街」，是北門城外串聯各地的貿易要道。走在這條街上，兩側成排的閩南式街屋騎樓一字排開，紅燈籠在屋簷下隨風輕搖，部分店面的牌匾字跡斑駁，透露著一甲子以上的歲月。街屋立面風格混雜了清代閩式傳統與日治時期改建的洋樓元素，外廊拱柱與磨石子地板記錄了不同時代的建築流行。老字號糕餅舖、傳統米食店與古玩攤販夾雜在新開的咖啡館和文創小店之間，形成一種新舊並陳的生活質地。每逢假日，街頭不時有廟會巡境或傳統表演活動，鑼鼓喧天，讓這條老街不僅是歷史標本，更是充滿煙火氣息的生活現場。
  observationPrompt: "觀察街屋騎樓柱子的材質與式樣，能找到幾種不同年代的柱式——清代磚柱、日式洗石子圓柱或戰後水泥方柱？"
