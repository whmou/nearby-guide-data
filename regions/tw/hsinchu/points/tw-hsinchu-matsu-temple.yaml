  title: "新竹天后宮"
  summary: "新竹天后宮供奉海神媽祖，見證了竹塹港昔日的漁業與海運繁景，是新竹沿海移民信仰的精神寄託。"
  narration: |
    新竹天后宮的歷史可追溯至清代，當年來自閩粵的移民乘船橫渡台灣海峽，在驚濤駭浪中虔誠祈求媽祖庇佑，平安抵埠後便在竹塹港附近建廟酬謝神恩。廟宇主殿供奉黑面媽祖金身，神情莊嚴慈悲，兩側千里眼與順風耳護法塑像栩栩如生。廟前埕廣場保留了傳統斗拱木構出簷，廊柱間的泥塑故事板描繪媽祖救難護航的種種神蹟。每年農曆三月媽祖誕辰遶境，各地信眾湧入，鑾轎過境時家家戶戶燃放鞭炮、焚香膜拜，場面震撼人心。
  observationPrompt: "請留意廟宇正門兩側千里眼與順風耳神像的造型差異，並找找看廟內哪裡記錄了媽祖護船救難的傳說故事。"
